      </div>
      <div class="card-body">
        <div class="conflict-box">
          ${conflicts.map(c=>`
            <div class="conflict-item">
              <span style="font-size:1rem">⚠️</span>
              <div>
                <div style="font-weight:700">${h(c.type)}</div>
                <div style="color:var(--red);opacity:.8;margin-top:2px">${h(c.detail)}</div>
              </div>
            </div>`).join("")}
        </div>
      </div>
    </div>`;

function detectAllConflicts(){
  const conflicts=[];
  const globalFacMap={};
  const globalRoomMap={};
  timetables.forEach(tt=>{
    tt.days.forEach((day,di)=>{
      tt.periods.forEach((p,pi)=>{
        if(p.isBreak)return;
        const abbr=(tt.grid[di]||{})[pi]||"";
        if(!abbr)return;
        const subj=(tt.subjects||[]).find(s=>s.abbr?.toUpperCase()===abbr.toUpperCase());
        // Faculty double-booking check (supports multi-faculty)
        if(subj&&subj.staff){
          parseStaff(subj.staff).forEach(fac=>{
            const key=`${fac.toLowerCase().trim()}|${day}|${pi}`;
            if(globalFacMap[key]){
              conflicts.push({type:"Faculty Double Booking",detail:`${fac} is scheduled in 2 classes on ${day} at period ${p.num} (${tt.branch.name} Sec-${tt.section} & ${globalFacMap[key]})`});
            } else globalFacMap[key]=`${tt.branch.name} Sec-${tt.section}`;
          });
        }
        // Room double-booking check
        if(subj&&subj.type==="lab"){
          const labRoom=((tt.roomGrid&&tt.roomGrid[di])?tt.roomGrid[di][pi]||"":"")||
                        (subj.labRoom||"").trim()||`${tt.branch.name} Lab`;
          if(labRoom){
            const rkey=`${labRoom.toLowerCase()}|${day}|${pi}`;
            if(globalRoomMap[rkey]){
              conflicts.push({type:"Room Double Booking",detail:`Room "${labRoom}" is used by 2 classes on ${day} at period ${p.num} (${tt.branch.name} Sec-${tt.section} & ${globalRoomMap[rkey]})`});
            } else globalRoomMap[rkey]=`${tt.branch.name} Sec-${tt.section}`;
          }
        }
        // Room type mismatch
        if(subj&&tt.roomGrid&&tt.roomGrid[di]){
          const assignedRoom=(tt.roomGrid[di][pi]||'').toLowerCase();
          if(subj.type==='theory'&&assignedRoom.includes('lab')){
            conflicts.push({type:'Room Type Mismatch',detail:`Theory "${abbr}" in lab room at ${tt.branch.name} Sec-${tt.section} ${day} P${p.num}`});
          }
        }
      });
    });
  });
  return conflicts;
}

/* ── Assigned Slots Tracker Panel ── */
function renderAssignedSlots(){
  // Build the slot map live from all timetables (always fresh & accurate)
  const facMap={}; // { staffName: { "MON|4": [{branch,section,abbr,time}] } }
  timetables.forEach(tt=>{
    const sm={};(tt.subjects||[]).forEach(s=>{if(s.abbr)sm[s.abbr.toUpperCase()]=s;});
    tt.days.forEach((day,di)=>{
      tt.periods.forEach((p,pi)=>{
        if(p.isBreak)return;
        const abbr=(tt.grid[di]||{})[pi]||"";
        if(!abbr)return;
        const subj=sm[abbr.toUpperCase()];
        if(!subj||!subj.staff)return;
        const staff=subj.staff;
        if(!facMap[staff])facMap[staff]={};
        const slotKey=`${day}|${pi}`;
        if(!facMap[staff][slotKey])facMap[staff][slotKey]=[];
        facMap[staff][slotKey].push({branch:tt.branch.name,section:tt.section,abbr,time:p.start,day,pNum:p.num});
      });
    });
  });

  const sorted=Object.keys(facMap).sort();
  if(!sorted.length)return`<div class="card"><div class="card-body" style="text-align:center;padding:40px"><div style="font-size:2.5rem;margin-bottom:12px">📌</div><div style="font-weight:700;font-size:.95rem;color:var(--text-muted)">No assigned slots yet.</div><div style="font-size:.78rem;color:var(--text-subtle);margin-top:5px">Generate timetables first.</div></div></div>`;

  // Count conflicts for badge
  let totalConflicts=0;
  sorted.forEach(staff=>{Object.values(facMap[staff]).forEach(entries=>{if(entries.length>1)totalConflicts++;});});

  return`

/* ════ MODIFY TIMETABLE MODE ════ */
function enterModifyMode(ttId){
  const tt=timetables.find(t=>t.id===ttId);
  if(!tt){showToast("Timetable not found","err");return;}
  modifyMode=true;
  modifyTarget=ttId;
  modifiedCells[ttId]=modifiedCells[ttId]||new Set();
  // Lock all currently occupied slots
  const locked=new Set();
  tt.days.forEach((day,di)=>{
    tt.periods.forEach((p,pi)=>{
      if(p.isBreak)return;
      const abbr=(tt.grid[di]||{})[pi]||"";
      if(abbr)locked.add(`${di}_${pi}`);
    });
  });
  lockedSlots[ttId]=locked;
  // Store snapshot of original grid for reference
  tt._origGrid=JSON.parse(JSON.stringify(tt.grid));
  document.getElementById("hdr-mode-badge").classList.remove("hidden");
  showToast(`✏️ Modify Mode: ${tt.branch.name} Sec-${tt.section} — ${locked.size} slots locked`,"modify");
  resultTab="class";renderResult();
}

function exitModifyMode(){
  modifyMode=false;modifyTarget=null;
  document.getElementById("hdr-mode-badge").classList.add("hidden");
  showToast("Exited Modify Mode","info");renderResult();
}

function checkModifyConflicts(){
  const conflicts=detectAllConflicts();
  const modConflicts=conflicts.filter(c=>c.detail.includes(timetables.find(t=>t.id===modifyTarget)?.branch?.name||""));
  if(!modConflicts.length){
    showToast("✅ No conflicts in modified timetable","ok");
  } else {
    showToast(`⚠️ ${modConflicts.length} conflict(s) detected after modification!`,"err");
    resultTab="conflicts";renderResult();
  }
}

async function repairCurrentTimetable(){
  if(!modifyTarget){showToast("No timetable in modify mode","err");return;}
  const tt=timetables.find(t=>t.id===modifyTarget);
  if(!tt){showToast("Timetable not found","err");return;}

  // Build a fresh assignedSlots map from ALL timetables (so cross-tt conflicts are respected)
  const assignedSlots={};
  timetables.forEach(other=>{
    other.days.forEach((day,di)=>{
      other.periods.forEach((p,pi)=>{
        if(p.isBreak)return;
        const abbr=(other.grid[di]||{})[pi]||"";
        if(!abbr)return;
        const subj=(other.subjects||[]).find(s=>(s.abbr||"").toUpperCase()===abbr.toUpperCase());
        if(subj&&subj.staff){
          const key=subj.staff.toLowerCase().trim();
          if(!assignedSlots[key])assignedSlots[key]=new Set();
          // Don't lock slots from the current tt (they should be re-repairable)
          if(other.id!==modifyTarget)assignedSlots[key].add(`${di}_${pi}`);
        }
      });
    });
  });

  // Also lock the locked slots in the current timetable into assignedSlots
  const locked=lockedSlots[modifyTarget]||new Set();
  tt.days.forEach((day,di)=>{
    tt.periods.forEach((p,pi)=>{
      if(p.isBreak)return;
      const slotKey=`${di}_${pi}`;
      if(locked.has(slotKey)){
        const abbr=(tt.grid[di]||{})[pi]||"";
        if(!abbr)return;
        const subj=(tt.subjects||[]).find(s=>(s.abbr||"").toUpperCase()===abbr.toUpperCase());
        if(subj&&subj.staff){
          const key=subj.staff.toLowerCase().trim();
          if(!assignedSlots[key])assignedSlots[key]=new Set();
          assignedSlots[key].add(slotKey);
        }
      }
    });
  });

  const repairLog=[];
  const nd=tt.days.length;
  repairGrid(tt.grid,tt.subjects,tt.periods,nd,assignedSlots,repairLog);

  // Mark repaired cells as modified
  if(!modifiedCells[modifyTarget])modifiedCells[modifyTarget]=new Set();
  tt.days.forEach((day,di)=>{
    tt.periods.forEach((p,pi)=>{
      if(p.isBreak)return;
      const slotKey=`${di}_${pi}`;
      if(!locked.has(slotKey)){
        const abbr=(tt.grid[di]||{})[pi]||"";
        if(abbr)modifiedCells[modifyTarget].add(slotKey);
      }
    });
  });

  await dbSet("jntua_eng_tts",timetables);
  const issues=repairLog.filter(l=>l.includes("⚠"));
  if(issues.length){
    showToast(`🔧 Repair done — ${issues.length} unresolvable slot(s). Check console.`,"warn");
  } else {
    showToast("🔧 Timetable repaired successfully!","ok");
  }
  resultTab="class";renderResult();
}

  const sm={};(tt.subjects||[]).forEach(s=>{if(s.abbr)sm[s.abbr.toUpperCase()]=s;});
  const cc=abbr=>{const s=sm[(abbr||"").toUpperCase()];if(!s||!abbr)return"t-free";return s.type==="lab"?"t-lab":"t-theory";};
  const isModifyTarget=modifyMode&&modifyTarget===tt.id;
  const locked=lockedSlots[tt.id]||new Set();
  const modified=modifiedCells[tt.id]||new Set();
  const nd=tt.days.length;

  // Build header — break columns get an empty <th> placeholder (no rowspan here)
  let hd=`<th style="min-width:48px">DAY</th>`;
  tt.periods.forEach((p)=>{
    if(p.isBreak){
      // Empty header cell — the actual merged cell lives in tbody with rowspan
      hd+=`<th style="background:var(--amber);width:18px;min-width:18px;max-width:18px;padding:0;border:1px solid var(--border-strong)"></th>`;
    } else {
      hd+=`<th>${h(p.num)}<br><span style="font-weight:400;font-size:.51rem">${h(p.start)}</span></th>`;
    }
  });

  let rows="";
  tt.days.forEach((day,di)=>{
    let cells=`<td class="day-lbl">${h(day)}</td>`;
    tt.periods.forEach((p,pi)=>{
      if(p.isBreak){
        // Only render the merged LUNCH cell on the FIRST day row (di===0)
        // It spans all nd rows vertically
        if(di===0){
          cells+=`<td rowspan="${nd}" style="background:var(--amber);color:#000000;font-weight:900;font-size:.85rem;padding:2px 1px;writing-mode:vertical-rl;text-orientation:mixed;letter-spacing:2px;vertical-align:middle;text-align:center;border:1.5px solid #d97706;white-space:nowrap;width:18px;min-width:18px;max-width:18px">${h(p.label||"BRK")}</td>`;
        }
        // For di>0, skip — already covered by rowspan
        return;
      }
      const abbr=(tt.grid[di]||{})[pi]||"";
      const assignedFac=(tt.facGrid&&tt.facGrid[di]&&tt.facGrid[di][pi])||"";
      const assignedRoom=(tt.roomGrid&&tt.roomGrid[di]&&tt.roomGrid[di][pi])||"";
      const isLab=!!abbr&&(sm[(abbr||"").toUpperCase()]||{}).type==="lab";
      const slotKey=`${di}_${pi}`;
      const isLocked=isModifyTarget&&locked.has(slotKey);
      const isModified=modified.has(slotKey);
      let cellClass=cc(abbr);
      if(isLocked)cellClass+=" t-locked locked-cell";
      else if(isModified)cellClass+=" t-modified-cell";
      const canEdit=editable&&(!isModifyTarget||(isModifyTarget&&!isLocked));
      const editAttr=canEdit?` onclick="openEditor(event,'${h(tt.id)}',${di},${pi},${isLocked})"`:
        isLocked?` onclick="showToast('🔒 This slot is locked — it was part of the original timetable','warn')"`:
        editable?` onclick="openEditor(event,'${h(tt.id)}',${di},${pi},false})"`:"";;
      const lockedIcon=isLocked?`<span style="font-size:.5rem;opacity:.5;margin-left:2px">🔒</span>`:"";
      const facShort=assignedFac?assignedFac.replace(/^(Dr\.|Mr\.|Ms\.)\s*/i,""):"";
      const subLabel=abbr?`<div style="font-size:.46rem;opacity:.65;line-height:1.2;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${h(assignedFac)}">${h(facShort)}</div>${isLab&&assignedRoom?`<div style="font-size:.42rem;opacity:.5;line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${h(assignedRoom)}">🔬${h(assignedRoom)}</div>`:""}`:""
      cells+=`<td id="c-${h(tt.id)}-${di}-${pi}" class="${cellClass}${(canEdit||isLocked)?" editable":""}"${editAttr} style="line-height:1.3;vertical-align:middle;padding:4px 5px">${h(abbr)||"—"}${lockedIcon}${subLabel}</td>`;
    });
    rows+=`<tr>${cells}</tr>`;
  });

  let sRows="";
  (tt.subjects||[]).forEach((s,i)=>{
    const staffList=parseStaff(s.staff);
    const isLab=s.type==="lab";
    const roomLabel=isLab?(s.labRoom||`${tt.branch.name} Lab (auto)`):`${tt.branch.name} – Sec ${tt.section}`;
    sRows+=`<tr style="background:${i%2?"#f8fafc":"#ffffff"}">
      <td style="color:#0f172a;font-weight:700">${i+1}</td>
      <td style="text-align:left;font-weight:700;color:#0f172a">${h(s.name)}</td>
      <td style="font-weight:800;color:#1a3a5c">${h(s.abbr)}</td>
      <td style="color:#374151">${h(s.code)}</td>
      <td style="text-align:left;color:#0f172a;font-weight:600">${staffList.map(n=>`<span style="display:inline-block;background:${isLab?"var(--gold-pale)":"#eff6ff"};border:1px solid ${isLab?"#fde68a":"#bfdbfe"};border-radius:4px;padding:1px 6px;font-size:.62rem;margin:1px">${h(n)}</span>`).join("")||"—"}</td>
      <td><span class="tag ${isLab?"t-gold":"t-blue"}">${s.type}</span></td>
      <td style="color:#374151;font-size:.67rem">${h(roomLabel)}</td>
      <td style="color:#0f172a;font-weight:700">${s.hrs}</td>
    </tr>`;
  });

  const modNote=isModifyTarget?`<div class="alert a-modify no-print">✏️ <b>Modify Mode:</b> Click unlocked cells (non-🔒) to reassign subjects. Locked slots are protected from change.</div>`:"";
  const editNote=editable&&!isModifyTarget?`<div class="alert a-info no-print">💡 <b>Admin Mode:</b> Click any cell to reassign a subject.</div>`:"";

  return`
    <div style="text-align:center;margin-bottom:16px;padding-bottom:14px;border-bottom:2px solid var(--border)">
      <div style="font-family:'Playfair Display',serif;font-weight:900;font-size:1.05rem;color:var(--gold);letter-spacing:3px">JNTUACEA</div>
      <div style="font-size:.69rem;font-weight:700;color:var(--text);text-transform:uppercase;margin:4px 0">JNTUACEA College of Engineering (Autonomous), Ananthapuramu</div>
      <div style="font-size:.65rem;color:var(--accent);font-weight:700;margin-bottom:7px">Dept. of ${h(tt.branch.fullName)}</div>
      <div style="background:var(--primary-light);color:#fff;font-weight:800;font-size:.75rem;padding:5px 16px;border-radius:7px;display:inline-block">
        ${h(tt.branch.year)} · Sem ${h(tt.branch.sem)} · ${h(tt.branch.name)} · Section ${h(tt.section)}
      </div>
    </div>
    ${modNote}${editNote}
    <div class="tbl-scroll"><table class="tt"><thead><tr>${hd}</tr></thead><tbody>${rows}</tbody></table></div>
    <div style="margin-top:16px">
      <div style="font-weight:800;font-size:.72rem;color:var(--primary);margin-bottom:7px;text-transform:uppercase">📚 Subjects</div>
      <table class="subjt"><thead><tr>${["#","Subject","Abbr","Question Code","Faculty","Type","Room","Hrs/Wk"].map(x=>`<th>${x}</th>`).join("")}</tr></thead><tbody>${sRows}</tbody></table>
    </div>
    <div style="display:flex;justify-content:space-between;margin-top:24px;padding-top:12px;border-top:1px solid var(--border);font-weight:800;font-size:.69rem;color:var(--primary);text-transform:uppercase;flex-wrap:wrap;gap:10px">
      <span>HEAD OF DEPARTMENT</span><span>VICE PRINCIPAL</span><span>PRINCIPAL</span>
    </div>`;
}

/* ════ CELL EDITOR ════ */
function openEditor(evt,ttId,di,pi,isLocked=false){
  evt.stopPropagation();
  if(isLocked){showToast("🔒 Slot is locked — protected from modification","warn");return;}
  const tt=timetables.find(t=>t.id===ttId);if(!tt)return;
  edState={di,pi,ttId};
  const cur=((tt.grid[di]||{})[pi]||"").toUpperCase();
  const isModTarget=modifyMode&&modifyTarget===ttId;

  const ceTitle=document.getElementById("ce-title");
  const ceModInfo=document.getElementById("ce-modify-info");
  const ceClearBtn=document.getElementById("ce-clear-btn");

  ceTitle.textContent=isModTarget?"✏️ Modify Slot":"✏️ Edit Slot";

  if(isModTarget){
    ceModInfo.classList.remove("hidden");
    ceModInfo.textContent=`Modify Mode: Changes here will be tracked and logged. Original slot: "${cur||"Free"}"`;
    ceClearBtn.textContent="🗑 Clear (Remove Subject)";
  } else {
    ceModInfo.classList.add("hidden");
    ceClearBtn.textContent="🗑 Clear Slot";
  }

  document.getElementById("ce-list").innerHTML=(tt.subjects||[]).filter(s=>s.abbr).map(s=>{
    const isA=s.abbr.toUpperCase()===cur;
    return`<button class="ce-btn${isA?" ce-active":""}" onclick="cellSet('${h(s.abbr)}')" style="${isA?"":"background:"+(s.type==="lab"?"var(--gold-pale)":"#eff6ff")}">
      ${s.type==="lab"?"🔬":"📖"} <b>${h(s.abbr)}</b> — ${h(s.name)}</button>`;
  }).join("")||`<div style="color:var(--text-subtle);font-size:.76rem;padding:8px">No subjects found.</div>`;

  const ed=document.getElementById("cell-editor");
  ed.classList.remove("hidden");
  ed.style.left=Math.min(evt.clientX,window.innerWidth-300)+"px";
  ed.style.top=Math.min(evt.clientY+10,window.innerHeight-380)+"px";
}

async function cellSet(abbr){
  const{di,pi,ttId}=edState;
  const tt=timetables.find(t=>t.id===ttId);if(!tt)return;
  const from=((tt.grid[di]||{})[pi]||"");

  // ② Pre-assignment conflict check — block if faculty or room double-booked at this slot
  const subj=(tt.subjects||[]).find(s=>(s.abbr||"").toUpperCase()===abbr.toUpperCase());
  if(subj&&subj.staff){
    const staffList=parseStaff(subj.staff);
    let facConflict=null;
    timetables.forEach(other=>{
      if(other.id===ttId||facConflict)return;
      const otherAbbr=(other.grid[di]||{})[pi]||"";
      if(!otherAbbr)return;
      const otherSubj=(other.subjects||[]).find(s=>(s.abbr||"").toUpperCase()===otherAbbr.toUpperCase());
      if(!otherSubj||!otherSubj.staff)return;
      const otherStaffList=parseStaff(otherSubj.staff);
      const sharedFac=staffList.find(n=>otherStaffList.some(o=>o.toLowerCase()===n.toLowerCase()));
      if(sharedFac){
        facConflict={cls:`${other.branch.name} Sec-${other.section}`,faculty:sharedFac};
      }
    });
    if(facConflict){
      showToast(`⚠️ Faculty Conflict! ${facConflict.faculty} is already teaching ${facConflict.cls} at Day ${di+1} / Period ${pi+1}`,"err");
      return;
    }
  }
  // ② Room double-booking check for lab subjects
  if(subj&&subj.type==="lab"){
    const labRoom=(subj.labRoom||"").trim()||`${tt.branch.name} Lab`;
    let roomConflict=null;
    timetables.forEach(other=>{
      if(other.id===ttId||roomConflict)return;
      const otherAbbr=(other.grid[di]||{})[pi]||"";
      if(!otherAbbr)return;
      const otherRoom=(other.roomGrid&&other.roomGrid[di])?other.roomGrid[di][pi]||"":"";
      if(otherRoom&&otherRoom.toLowerCase()===labRoom.toLowerCase()){
        roomConflict=`${other.branch.name} Sec-${other.section}`;
      }
    });
    if(roomConflict){
      showToast(`⚠️ Room Conflict! "${labRoom}" is already occupied by ${roomConflict} at Day ${di+1} / Period ${pi+1}`,"err");
      return;
    }
  }

  if(!tt.grid[di])tt.grid[di]={};
  tt.grid[di][pi]=abbr;

  // ③ Update _globalAssignedSlots if the registry was built (best-effort)
  if(subj&&subj.staff){
    const key=subj.staff.toLowerCase().trim();
    if(!_globalAssignedSlots[key])_globalAssignedSlots[key]=new Set();
    _globalAssignedSlots[key].add(`${di}_${pi}`);
  }

  // Track modification
  const isModTarget=modifyMode&&modifyTarget===ttId;
  if(isModTarget){
    if(!modifiedCells[ttId])modifiedCells[ttId]=new Set();
    modifiedCells[ttId].add(`${di}_${pi}`);
    const entry={ts:Date.now(),ttId,di,pi,from,to:abbr,reason:"Manual reassignment in Modify Mode",user:session?.name||"Admin"};
    modificationLog.push(entry);
    await dbSet("jntua_mod_log",modificationLog);
  }

  await dbSet("jntua_eng_tts",timetables);

  // Update cell in DOM
  const sm={};(tt.subjects||[]).forEach(s=>{if(s.abbr)sm[s.abbr.toUpperCase()]=s;});
  const s=sm[abbr.toUpperCase()];
  const cel=document.getElementById(`c-${ttId}-${di}-${pi}`);
  if(cel){
    const baseClass=s?s.type==="lab"?"t-lab":"t-theory":"t-free";
    const modClass=isModTarget?" t-modified-cell":"";
    cel.className=baseClass+modClass+" editable";
    cel.textContent=abbr;
  }
  closeEditor();
  showToast(`✅ ${abbr} assigned${isModTarget?" (logged)":""}`,isModTarget?"modify":"ok");
}

async function cellClear(){
  const{di,pi,ttId}=edState;
  const tt=timetables.find(t=>t.id===ttId);if(!tt)return;
  const from=((tt.grid[di]||{})[pi]||"");
  if(!tt.grid[di])tt.grid[di]={};
  tt.grid[di][pi]="";

  const isModTarget=modifyMode&&modifyTarget===ttId;
  if(isModTarget){
    if(!modifiedCells[ttId])modifiedCells[ttId]=new Set();
    modifiedCells[ttId].add(`${di}_${pi}`);
    const entry={ts:Date.now(),ttId,di,pi,from,to:"",reason:"Slot cleared in Modify Mode",user:session?.name||"Admin"};
    modificationLog.push(entry);
    await dbSet("jntua_mod_log",modificationLog);
  }

  await dbSet("jntua_eng_tts",timetables);
  const cel=document.getElementById(`c-${ttId}-${di}-${pi}`);
  if(cel){cel.textContent="—";cel.className="t-free editable";}
  closeEditor();
  showToast("Slot cleared","warn");
}

function closeEditor(){document.getElementById("cell-editor").classList.add("hidden");}
document.addEventListener("click",e=>{
  const ed=document.getElementById("cell-editor");
  if(!ed.classList.contains("hidden")&&!ed.contains(e.target))closeEditor();
});
</script>
