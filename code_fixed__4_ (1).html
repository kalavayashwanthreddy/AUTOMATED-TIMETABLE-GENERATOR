<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>JNTUACEACEA — Timetable System</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=DM+Mono:wght@400;500&family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
:root{
  /* Core palette — clean white base */
  --primary:#1a3a5c;--primary-light:#2557a7;--primary-dark:#0e2035;
  --accent:#0ea5a0;--accent-light:#14b8b3;--accent-dark:#0a7a76;
  --gold:#d97706;--gold-light:#f59e0b;--gold-pale:#fef3c7;
  --red:#dc2626;--red-light:#fef2f2;--red-pale:#fee2e2;
  --green:#059669;--green-light:#ecfdf5;
  --amber:#b45309;--amber-light:#fffbeb;
  --purple:#6d28d9;--purple-light:#ede9fe;
  --rose:#e11d48;

  /* Surfaces */
  --bg:#f8fafc;--surface:#ffffff;--surface2:#f1f5f9;--surface3:#e2e8f0;
  --border:#e2e8f0;--border-strong:#cbd5e1;
  --text:#0f172a;--text-muted:#475569;--text-subtle:#94a3b8;

  /* Shadows */
  --shadow-sm:0 1px 3px rgba(15,23,42,.08),0 1px 2px rgba(15,23,42,.04);
  --shadow:0 4px 16px rgba(15,23,42,.08),0 2px 6px rgba(15,23,42,.04);
  --shadow-lg:0 16px 48px rgba(15,23,42,.12),0 4px 16px rgba(15,23,42,.06);
  --shadow-xl:0 24px 64px rgba(15,23,42,.16),0 8px 24px rgba(15,23,42,.08);

  --r:12px;--r-sm:8px;--r-lg:16px;--r-xl:20px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:'Plus Jakarta Sans',sans-serif;
  background:var(--bg);
  min-height:100vh;color:var(--text);
  overflow-x:hidden;
}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--surface2)}
::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text-subtle)}

/* ── HEADER ── */
.hdr{
  background:#ffffff;
  border-bottom:2px solid var(--border);
  position:sticky;top:0;z-index:500;
  box-shadow:0 2px 12px rgba(15,23,42,.08);
}
.hdr-inner{max-width:1500px;margin:0 auto;padding:0 24px;display:flex;align-items:center;gap:14px;height:62px;flex-wrap:wrap}
.hdr-logo{
  width:54px;height:54px;border-radius:50%;
  background:#fff;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 0 2px rgba(26,58,92,.2),0 4px 12px rgba(26,58,92,.18);
  flex-shrink:0;cursor:pointer;overflow:hidden;
  transition:box-shadow .18s,transform .18s;
  padding:2px;
}
.hdr-logo:hover{box-shadow:0 0 0 3px rgba(217,119,6,.4),0 6px 18px rgba(217,119,6,.25);transform:scale(1.06);}
.hdr-logo:active{transform:scale(.97);}
.hdr-brand{font-family:'Playfair Display',serif;font-weight:900;font-size:1.05rem;color:var(--primary);letter-spacing:.5px}
.hdr-sub{color:var(--text-muted);font-size:.6rem;letter-spacing:1px;text-transform:uppercase;margin-top:1px}
.hdr-pill{
  background:var(--surface2);border:1px solid var(--border-strong);
  color:var(--text-muted);font-size:.63rem;font-weight:700;
  padding:4px 12px;border-radius:20px;letter-spacing:.5px;
}

/* ── LAYOUT ── */
.wrap{max-width:1500px;margin:0 auto;padding:24px 24px 32px}

/* ── BUTTONS ── */
.btn{
  font-family:'Plus Jakarta Sans',sans-serif;border:none;
  padding:9px 18px;border-radius:var(--r-sm);
  font-weight:700;font-size:.82rem;cursor:pointer;
  transition:all .15s cubic-bezier(.4,0,.2,1);
  display:inline-flex;align-items:center;gap:6px;
  white-space:nowrap;letter-spacing:.1px;
}
.btn:hover{transform:translateY(-1px)}
.btn:active{transform:translateY(0);filter:brightness(.95)}
.btn-primary{background:var(--primary-light);color:#fff;box-shadow:0 2px 8px rgba(37,87,167,.35)}
.btn-primary:hover{background:var(--primary);box-shadow:0 4px 16px rgba(37,87,167,.4)}
.btn-accent{background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(14,165,160,.3)}
.btn-accent:hover{background:var(--accent-dark);box-shadow:0 4px 16px rgba(14,165,160,.4)}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold-light));color:#fff;box-shadow:0 2px 8px rgba(217,119,6,.3)}
.btn-gold:hover{box-shadow:0 4px 16px rgba(217,119,6,.4)}
.btn-green{background:var(--green);color:#fff;box-shadow:0 2px 8px rgba(5,150,105,.3)}
.btn-green:hover{background:#047857;box-shadow:0 4px 16px rgba(5,150,105,.4)}
.btn-danger{background:var(--red-light);color:var(--red);border:1.5px solid var(--red-pale)}
.btn-danger:hover{background:#fee2e2}
.btn-outline{background:transparent;border:2px solid var(--border-strong);color:var(--text-muted)}
.btn-outline:hover{border-color:var(--primary-light);color:var(--primary-light);background:rgba(37,87,167,.04)}
.btn-ghost-light{background:var(--surface2);border:1px solid var(--border-strong);color:var(--text-muted)}
.btn-ghost-light:hover{background:var(--border)}
.btn-modify{
  background:linear-gradient(135deg,#7c3aed,#6d28d9);color:#fff;
  box-shadow:0 2px 8px rgba(109,40,217,.35);
}
.btn-modify:hover{box-shadow:0 4px 16px rgba(109,40,217,.45)}
.btn-sm{padding:6px 12px!important;font-size:.74rem!important}
.btn-xs{padding:3px 9px!important;font-size:.67rem!important}

/* ── CARDS ── */
.card{
  background:var(--surface);border-radius:var(--r-lg);
  box-shadow:var(--shadow);border:1px solid var(--border);
  overflow:hidden;
}
.card-hdr{
  padding:16px 22px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;flex-wrap:wrap;
  background:linear-gradient(180deg,var(--surface) 0%,var(--surface2) 100%);
}
.card-body{padding:20px 22px}

/* ── STATS ── */
.stat-card{
  background:var(--surface);border-radius:var(--r);
  border:1px solid var(--border);
  box-shadow:var(--shadow-sm);
  padding:16px 18px;
  position:relative;overflow:hidden;
  transition:box-shadow .18s,transform .18s;
}
.stat-card:hover{box-shadow:var(--shadow);transform:translateY(-2px)}
.stat-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:var(--stat-color,var(--primary-light));
}
.stat-val{font-family:'Playfair Display',serif;font-size:1.7rem;font-weight:900;line-height:1;color:var(--stat-color,var(--primary-light));margin:4px 0 2px}
.stat-lbl{font-size:.63rem;color:var(--text-subtle);font-weight:700;text-transform:uppercase;letter-spacing:.6px}
.stat-icon{font-size:1.5rem;margin-bottom:6px}

/* ── TABS ── */
.tab-bar{
  display:flex;gap:2px;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--r-sm);padding:3px;
  margin-bottom:18px;overflow-x:auto;flex-wrap:nowrap;
}
.tab-btn{
  padding:8px 16px;border:none;border-radius:6px;
  font-weight:700;font-size:.76rem;cursor:pointer;
  white-space:nowrap;background:transparent;
  color:var(--text-muted);
  font-family:'Plus Jakarta Sans',sans-serif;
  transition:all .16s;
}
.tab-btn.active{
  background:var(--surface);
  color:var(--primary-light);
  box-shadow:var(--shadow-sm);
  border:1px solid var(--border);
}
.tab-btn:hover:not(.active){background:var(--surface);color:var(--text)}

/* ── DARK TAB BAR (for dark sections) ── */
.tab-bar-dark{
  display:flex;gap:2px;
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);
  border-radius:var(--r-sm);padding:3px;
  margin-bottom:16px;overflow-x:auto;
}
.tab-btn-dark{
  padding:8px 14px;border:none;border-radius:6px;
  font-weight:700;font-size:.74rem;cursor:pointer;
  white-space:nowrap;background:transparent;
  color:rgba(255,255,255,.45);
  font-family:'Plus Jakarta Sans',sans-serif;
  transition:all .16s;
}
.tab-btn-dark.active{
  background:var(--primary-light);color:#fff;
  box-shadow:0 2px 12px rgba(37,87,167,.4);
}
.tab-btn-dark:hover:not(.active){color:rgba(255,255,255,.75);background:rgba(255,255,255,.08)}

/* ── FORMS ── */
.fg{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
label.lbl{font-size:.63rem;font-weight:800;color:var(--text-muted);text-transform:uppercase;letter-spacing:.7px}
input,select,textarea{
  font-family:'Plus Jakarta Sans',sans-serif;font-size:.83rem;
  padding:9px 13px;border:1.5px solid var(--border);
  border-radius:var(--r-sm);color:var(--text);
  background:var(--surface);width:100%;
  transition:border-color .15s,box-shadow .15s;
}
input:focus,select:focus,textarea:focus{
  outline:none;border-color:var(--primary-light);
  box-shadow:0 0 0 3px rgba(37,87,167,.1);
}
input:disabled,select:disabled{background:var(--surface2);color:var(--text-subtle)}

/* ── ALERTS ── */
.alert{
  border-radius:var(--r-sm);padding:11px 15px;
  font-size:.78rem;margin-bottom:14px;font-weight:600;
  display:flex;align-items:flex-start;gap:9px;
  border:1px solid;
}
.a-info{background:#eff6ff;border-color:#bfdbfe;color:#1d4ed8}
.a-ok{background:var(--green-light);border-color:#a7f3d0;color:#065f46}
.a-warn{background:var(--amber-light);border-color:#fde68a;color:var(--amber)}
.a-err{background:var(--red-light);border-color:var(--red-pale);color:var(--red)}
.a-modify{background:var(--purple-light);border-color:#c4b5fd;color:var(--purple)}

/* ── TAGS ── */
.tag{padding:3px 9px;border-radius:20px;font-size:.62rem;font-weight:800;display:inline-block;letter-spacing:.3px}
.t-blue{background:#dbeafe;color:#1d4ed8}
.t-gold{background:var(--gold-pale);color:#92400e}
.t-green{background:#dcfce7;color:#166534}
.t-red{background:var(--red-pale);color:#991b1b}
.t-purple{background:var(--purple-light);color:#5b21b6}
.t-teal{background:#ccfbf1;color:#134e4a}
.t-pink{background:#fce7f3;color:#9d174d}
.t-orange{background:#ffedd5;color:#9a3412}
.t-locked{background:#f0fdf4;color:#166534;border:1px solid #bbf7d0}
.t-modified{background:var(--purple-light);color:var(--purple);border:1px solid #c4b5fd}
.t-infeasible{background:var(--red-pale);color:var(--red);border:1px solid #fca5a5}

/* ── TOGGLE ── */
.tog{
  width:40px;height:22px;border-radius:11px;border:none;
  cursor:pointer;display:flex;align-items:center;
  padding:2px 3px;transition:all .18s;flex-shrink:0;
}
.tog.on{background:var(--accent);justify-content:flex-end}
.tog.off{background:var(--border-strong);justify-content:flex-start}
.tog::after{content:'';width:18px;height:18px;border-radius:50%;background:#fff;display:block;box-shadow:var(--shadow-sm)}

/* ── SEC TOGGLE ── */
.sec-toggle{
  padding:4px 12px;border-radius:6px;font-weight:700;font-size:.73rem;
  border:2px solid var(--border);cursor:pointer;
  background:var(--surface2);color:var(--text-muted);
  font-family:'Plus Jakarta Sans',sans-serif;transition:all .15s;
}
.sec-toggle.on{background:var(--primary-light);border-color:var(--primary-light);color:#fff}

/* ── TYPE BTNS ── */
.type-btn{padding:4px 9px;border-radius:6px;font-size:.63rem;font-weight:800;border:1.5px solid var(--border);cursor:pointer;background:var(--surface2);color:var(--text-subtle);font-family:'Plus Jakarta Sans',sans-serif;transition:all .12s;white-space:nowrap}
.type-btn.tb-theory{background:#dbeafe;border-color:#93c5fd;color:#1d4ed8}
.type-btn.tb-lab{background:var(--gold-pale);border-color:#fde68a;color:#92400e}

/* ── TIMETABLE TABLE ── */
.tbl-scroll{overflow-x:auto;border-radius:var(--r-sm);border:1px solid var(--border)}
table.tt{width:100%;border-collapse:collapse;font-size:.68rem;font-family:'DM Mono',monospace}
table.tt th{border:1px solid var(--border-strong);padding:7px 8px;background:#ffffff;color:#0f172a;font-weight:800;text-align:center;font-family:'Plus Jakarta Sans',sans-serif;font-size:.67rem;white-space:nowrap;border-bottom:2px solid var(--border-strong)}
table.tt td{border:1px solid var(--border);padding:6px 7px;text-align:center;vertical-align:middle;min-width:60px;font-size:.69rem;transition:all .12s}
table.tt td.day-lbl{background:#f8fafc;color:#0f172a;font-weight:800;font-family:'Plus Jakarta Sans',sans-serif;font-size:.68rem;min-width:46px;border-right:2px solid var(--border-strong)}
table.tt td.brk{background:var(--amber-light);color:var(--amber);font-weight:700;font-size:.55rem;padding:4px 3px}
table.tt td.t-theory{background:#eff6ff;color:#1d4ed8;font-weight:700}
table.tt td.t-lab{background:var(--gold-pale);color:#92400e;font-weight:700}
table.tt td.t-free{background:var(--surface2);color:var(--text-subtle)}
table.tt td.t-locked{background:#f0fdf4;color:#166534;font-weight:700;border-color:#bbf7d0}
table.tt td.t-modified-cell{background:#f3e8ff;color:#6d28d9;font-weight:700;border-color:#c4b5fd;animation:pulseMod .6s ease}
@keyframes pulseMod{0%{background:#e9d5ff}100%{background:#f3e8ff}}
table.tt td.editable:hover{filter:brightness(.93);outline:2px solid var(--accent);cursor:pointer;z-index:2;position:relative}
table.tt td.locked-cell{cursor:not-allowed;position:relative}
table.tt td.locked-cell::after{content:'🔒';position:absolute;top:1px;right:2px;font-size:.5rem;opacity:.5}

/* ── SUBJECTS TABLE ── */
table.subjt{width:100%;border-collapse:collapse;font-size:.68rem}
table.subjt th{border:1px solid var(--border);padding:7px 9px;background:#f1f5f9;color:#0f172a;font-weight:800;text-transform:uppercase;font-size:.6rem;letter-spacing:.5px;font-family:'Plus Jakarta Sans',sans-serif;border-bottom:2px solid var(--border-strong)}
table.subjt td{border:1px solid var(--border);padding:6px 9px;text-align:center;color:#0f172a}

/* ── CELL EDITOR ── */
#cell-editor{
  position:fixed;z-index:9999;
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r-lg);padding:18px;
  box-shadow:var(--shadow-xl);
  min-width:220px;max-width:280px;
}
#cell-editor h4{color:var(--primary);font-size:.85rem;margin-bottom:12px;font-weight:800;font-family:'Playfair Display',serif}
.ce-list{display:flex;flex-direction:column;gap:4px;max-height:240px;overflow-y:auto}
.ce-btn{
  padding:8px 12px;border-radius:var(--r-sm);font-weight:700;
  font-size:.75rem;cursor:pointer;text-align:left;
  border:1.5px solid var(--border);
  background:var(--surface2);color:var(--text);
  font-family:'Plus Jakarta Sans',sans-serif;transition:all .12s;
}
.ce-btn:hover{background:#eff6ff;border-color:#93c5fd}
.ce-btn.ce-active{background:var(--primary-light);color:#fff;border-color:var(--primary-light)}
.ce-btn.ce-locked{opacity:.5;cursor:not-allowed}
.ce-clear,.ce-close{
  font-family:'Plus Jakarta Sans',sans-serif;cursor:pointer;
  width:100%;margin-top:5px;border-radius:var(--r-sm);
  font-weight:700;font-size:.73rem;padding:7px 12px;border:1.5px solid;
  transition:all .12s;
}
.ce-clear{background:var(--red-light);color:var(--red);border-color:var(--red-pale)}
.ce-clear:hover{background:var(--red-pale)}
.ce-close{background:var(--surface2);border-color:var(--border);color:var(--text-muted)}
.ce-close:hover{background:var(--border)}

/* ── GENERATE OVERLAY ── */
.gen-overlay{
  position:fixed;inset:0;
  background:rgba(15,23,42,.7);
  z-index:9000;display:flex;align-items:center;justify-content:center;
  backdrop-filter:blur(8px);
}
.gen-box{
  background:var(--surface);border-radius:var(--r-xl);
  padding:36px 48px;text-align:center;
  box-shadow:var(--shadow-xl);min-width:360px;
  border:1px solid var(--border);
}
.gen-spinner{
  width:56px;height:56px;
  border:4px solid var(--surface2);
  border-top-color:var(--accent);
  border-radius:50%;
  animation:spin 1s linear infinite;
  margin:0 auto 18px;
}
@keyframes spin{to{transform:rotate(360deg)}}
.gen-bar-wrap{height:6px;background:var(--surface2);border-radius:3px;margin-top:16px;overflow:hidden}
.gen-bar{height:100%;background:linear-gradient(90deg,var(--primary-light),var(--accent));border-radius:3px;transition:width .3s ease;width:0}

/* ── TOAST ── */
#toast{
  position:fixed;top:80px;right:20px;z-index:99999;
  padding:12px 22px;border-radius:var(--r);
  font-weight:700;font-size:.82rem;color:#fff;
  box-shadow:var(--shadow-lg);
  transition:all .4s cubic-bezier(.4,0,.2,1);
  opacity:0;pointer-events:none;
  font-family:'Plus Jakarta Sans',sans-serif;
  max-width:340px;display:flex;align-items:center;gap:8px;
  transform:translateX(30px);
}
#toast.show{opacity:1;transform:translateX(0)}

/* ── MODAL ── */
.modal-bg{
  position:fixed;inset:0;background:rgba(15,23,42,.6);
  z-index:8000;display:flex;align-items:center;justify-content:center;
  backdrop-filter:blur(6px);
}
.modal{
  background:var(--surface);border-radius:var(--r-xl);
  padding:28px 32px;box-shadow:var(--shadow-xl);
  min-width:360px;max-width:520px;width:100%;
  border:1px solid var(--border);
}
.modal h3{
  font-family:'Playfair Display',serif;font-weight:700;
  color:var(--primary);margin-bottom:20px;font-size:1.05rem;
}

/* ── USER ROW ── */
.user-row{
  display:grid;grid-template-columns:auto 1fr 1fr 1fr 1fr auto;
  gap:10px;align-items:center;
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r-sm);padding:10px 14px;margin-bottom:8px;
  font-size:.78rem;transition:box-shadow .14s;
}
.user-row:hover{box-shadow:var(--shadow-sm)}

/* ── BRANCH CARD ── */
.br-card{
  border-radius:var(--r);border:2px solid var(--border);
  overflow:hidden;transition:all .18s;background:var(--surface);
}
.br-card:hover{box-shadow:var(--shadow)}
.br-card-hdr{padding:12px 16px;display:flex;align-items:center;gap:10px}
.br-card-body{padding:14px 16px;background:var(--surface);border-top:1px solid var(--border)}

/* ── ROLE CARD ── */
.role-card{
  background:var(--surface);border:2px solid var(--border);
  border-radius:var(--r-lg);padding:22px 20px;cursor:pointer;
  transition:all .2s;display:flex;align-items:center;gap:14px;
  box-shadow:var(--shadow-sm);
}
.role-card:hover{border-color:var(--primary-light);box-shadow:var(--shadow);transform:translateY(-2px)}
.role-card.selected{border-color:var(--primary-light);background:#eff6ff}

/* ── BRANCH GRID ── */
.branch-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:12px;margin-bottom:18px}
.branch-pick{
  background:var(--surface);border:2px solid var(--border);
  border-radius:var(--r);padding:16px;cursor:pointer;
  transition:all .18s;text-align:center;box-shadow:var(--shadow-sm);
}
.branch-pick:hover{border-color:var(--primary-light);box-shadow:var(--shadow);transform:translateY(-2px)}
.branch-pick.selected{border-color:var(--primary-light);background:#eff6ff}

/* ── SEC PILL ── */
.sec-pill{
  padding:10px 22px;border-radius:30px;
  border:2px solid var(--border);background:var(--surface);
  color:var(--text-muted);font-weight:800;font-size:.85rem;cursor:pointer;
  transition:all .15s;font-family:'Plus Jakarta Sans',sans-serif;
  box-shadow:var(--shadow-sm);
}
.sec-pill:hover{border-color:var(--primary-light);color:var(--primary-light);background:#eff6ff}
.sec-pill.selected{border-color:var(--primary-light);background:var(--primary-light);color:#fff}

/* ── MODIFY MODE SPECIFIC ── */
.modify-banner{
  background:linear-gradient(135deg,#4c1d95,#6d28d9);
  border-radius:var(--r);padding:14px 20px;
  border:1px solid #c4b5fd;
  display:flex;align-items:center;gap:12px;
  margin-bottom:18px;
  box-shadow:0 4px 16px rgba(109,40,217,.25);
}
.locked-info{
  background:var(--green-light);border:1px solid #bbf7d0;
  border-radius:var(--r-sm);padding:10px 14px;
  font-size:.76rem;color:#065f46;margin-bottom:12px;
}
.mod-log-entry{
  display:flex;align-items:flex-start;gap:10px;
  padding:10px 14px;border-bottom:1px solid var(--border);
  font-size:.76rem;
}
.mod-log-entry:last-child{border-bottom:none}
.mod-log-ts{font-family:'DM Mono',monospace;color:var(--text-subtle);font-size:.67rem;white-space:nowrap}
.conflict-box{
  background:var(--red-light);border:1.5px solid var(--red-pale);
  border-radius:var(--r);padding:16px 20px;margin-top:12px;
}
.conflict-item{
  display:flex;align-items:flex-start;gap:8px;
  padding:8px 0;border-bottom:1px solid var(--red-pale);
  font-size:.76rem;color:var(--red);
}
.conflict-item:last-child{border-bottom:none}

/* ── QUICK LINKS ── */
.ql-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r);padding:12px 16px;cursor:pointer;
  transition:all .16s;display:flex;align-items:center;gap:10px;
  box-shadow:var(--shadow-sm);
}
.ql-card:hover{box-shadow:var(--shadow);transform:translateY(-1px);border-color:var(--primary-light)}

/* ── SECTION HEADER ── */
.section-hdr{
  display:flex;align-items:center;gap:12px;
  padding-bottom:14px;margin-bottom:18px;
  border-bottom:2px solid var(--border);
}
.section-hdr-icon{
  width:38px;height:38px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:1.1rem;flex-shrink:0;
}

/* ── DARK PANEL (login + nav bg) — now light/white ── */
/* ════ LOGIN PAGE ════ */
.login-page{
  min-height:calc(100vh - 62px);
  display:flex;align-items:center;justify-content:center;
  background:linear-gradient(145deg,#f0f4ff 0%,#faf5ff 45%,#f0fdf9 100%);
  padding:32px 16px;
}
.login-shell{
  width:100%;max-width:560px;
  display:flex;flex-direction:column;align-items:center;gap:0;
}
/* ── Logo + brand header ── */
.login-header{
  display:flex;flex-direction:column;align-items:center;
  text-align:center;margin-bottom:36px;
}
.login-logo-wrap{
  width:90px;height:90px;border-radius:22px;
  background:#ffffff;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 0 4px rgba(26,58,92,.08),0 8px 32px rgba(26,58,92,.14);
  cursor:pointer;overflow:hidden;
  transition:box-shadow .2s,transform .2s;
  margin-bottom:18px;flex-shrink:0;
}
.login-logo-wrap:hover{
  box-shadow:0 0 0 4px rgba(217,119,6,.35),0 10px 36px rgba(217,119,6,.22);
  transform:scale(1.04);
}
.login-title{
  font-family:'Playfair Display',serif;
  font-weight:900;font-size:1.55rem;
  color:var(--primary);letter-spacing:.3px;
  margin-bottom:6px;line-height:1.2;
}
.login-subtitle{
  font-size:.74rem;color:var(--text-muted);
  font-weight:500;line-height:1.5;
  max-width:340px;
}
/* ── Main card ── */
.login-card{
  width:100%;
  background:#ffffff;
  border-radius:24px;
  border:1.5px solid rgba(226,232,240,.8);
  box-shadow:0 4px 6px rgba(15,23,42,.04),0 12px 40px rgba(15,23,42,.08),0 24px 64px rgba(15,23,42,.06);
  padding:36px 36px 32px;
  display:flex;flex-direction:column;align-items:center;
}
.login-role-label{
  font-size:.63rem;font-weight:800;
  text-transform:uppercase;letter-spacing:1.2px;
  color:var(--text-subtle);
  margin-bottom:22px;
  display:flex;align-items:center;gap:8px;
}
.login-role-label::before,.login-role-label::after{
  content:'';flex:1;height:1px;background:var(--border);
  display:block;min-width:40px;
}
/* ── Role cards row ── */
.login-cards-row{
  display:flex;
  gap:16px;
  justify-content:center;
  width:100%;
}
.lrc{
  flex:1;max-width:220px;
  border-radius:18px;
  border:2px solid var(--border);
  padding:26px 18px 22px;
  cursor:pointer;
  display:flex;flex-direction:column;align-items:center;
  text-align:center;
  transition:transform .2s cubic-bezier(.4,0,.2,1),
             box-shadow .2s,border-color .2s,background .2s;
  position:relative;overflow:hidden;
  background:#ffffff;
}
.lrc::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  border-radius:18px 18px 0 0;
  background:var(--lrc-accent,var(--border));
  transition:opacity .2s;
}
.lrc:hover{
  transform:translateY(-4px);
  box-shadow:0 8px 28px rgba(15,23,42,.1),0 20px 48px rgba(15,23,42,.07);
}
.lrc-student{background:#faf7ff;border-color:#ddd6fe;}
.lrc-student::before{background:linear-gradient(90deg,#7c3aed,#a855f7);}
.lrc-student:hover{border-color:#a78bfa;background:#f5f0ff;}
.lrc-faculty{background:#f0fdf9;border-color:#a7f3d0;}
.lrc-faculty::before{background:linear-gradient(90deg,#059669,#10b981);}
.lrc-faculty:hover{border-color:#6ee7b7;background:#ecfdf5;}
.lrc-icon{
  width:58px;height:58px;border-radius:16px;
  display:flex;align-items:center;justify-content:center;
  font-size:1.7rem;margin-bottom:14px;
  transition:transform .2s;
}
.lrc:hover .lrc-icon{transform:scale(1.1);}
.lrc-student .lrc-icon{background:#ede9fe;}
.lrc-faculty .lrc-icon{background:#d1fae5;}
.lrc-name{
  font-family:'Playfair Display',serif;
  font-weight:700;font-size:1rem;
  color:var(--primary);margin-bottom:7px;
}
.lrc-desc{
  font-size:.7rem;color:var(--text-muted);
  line-height:1.55;margin-bottom:16px;flex:1;
}
.lrc-badge{
  display:inline-flex;align-items:center;gap:5px;
  padding:5px 14px;border-radius:20px;
  font-size:.65rem;font-weight:800;
  transition:all .15s;
}
.lrc-student .lrc-badge{
  background:#ede9fe;border:1px solid #c4b5fd;color:#6d28d9;
}
.lrc-student:hover .lrc-badge{background:#7c3aed;color:#fff;border-color:#7c3aed;}
.lrc-faculty .lrc-badge{
  background:#d1fae5;border:1px solid #6ee7b7;color:#065f46;
}
.lrc-faculty:hover .lrc-badge{background:#059669;color:#fff;border-color:#059669;}
/* ── Footer hint ── */
.login-footer{
  margin-top:20px;font-size:.61rem;
  color:var(--text-subtle);text-align:center;
  font-weight:600;letter-spacing:.3px;
}
@media(max-width:480px){
  .login-card{padding:24px 18px 22px;}
  .login-cards-row{flex-direction:column;align-items:center;}
  .lrc{max-width:100%;width:100%;}
  .login-title{font-size:1.25rem;}
}

.dark-panel{
  background:#ffffff;
  border-radius:var(--r-xl);border:1.5px solid var(--border);
  box-shadow:var(--shadow-lg);
}

/* ── FIREBASE STATUS ── */
#fb-status{
  position:fixed;bottom:16px;left:16px;z-index:99999;
  background:#ffffff;border:1.5px solid var(--border-strong);
  border-radius:var(--r-sm);padding:7px 14px;
  font-size:.67rem;font-family:'Plus Jakarta Sans',sans-serif;
  font-weight:700;color:var(--text);
  display:flex;align-items:center;gap:7px;
  transition:opacity .5s;box-shadow:var(--shadow);
}
#fb-dot{width:8px;height:8px;border-radius:50%;background:var(--border-strong);flex-shrink:0}
#fb-dot.connecting{background:var(--gold-light);animation:pulse .8s infinite alternate}
#fb-dot.connected{background:var(--green)}
#fb-dot.error{background:var(--red)}
@keyframes pulse{to{opacity:.3}}

/* ── UTILS ── */
.hidden{display:none!important}
.flex{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.divider{height:1px;background:var(--border);margin:16px 0}

/* ── PRINT ── */
@media print{
  body{background:#fff}
  .hdr,.btn,.no-print,#toast,#cell-editor,.gen-overlay,.modal-bg,#fb-status{display:none!important}
  .card{box-shadow:none;border:1px solid #ccc}
}

/* ── RESPONSIVE ── */
@media(max-width:700px){
  .user-row{grid-template-columns:1fr 1fr}
  .wrap{padding:16px 12px 60px}
  .hdr-inner{padding:0 14px;height:56px}
}

/* ── ANIMATIONS ── */
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .25s ease forwards}

/* ── FACULTY AVAILABILITY MODULE ── */
.avail-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;margin-top:14px}
.avail-faculty-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow-sm);transition:box-shadow .18s}
.avail-faculty-card:hover{box-shadow:var(--shadow)}
.avail-fac-hdr{padding:12px 16px;display:flex;align-items:center;gap:10px;background:linear-gradient(135deg,#1a3a5c,#2557a7);color:#fff}
.avail-fac-avatar{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.92rem;flex-shrink:0}
.avail-fac-body{padding:12px 14px}
.avail-slot-grid{display:grid;grid-template-columns:60px repeat(var(--n-periods,6),1fr);gap:3px;margin-top:8px}
.avail-hdr-cell{font-size:.55rem;font-weight:800;text-align:center;color:var(--text-subtle);text-transform:uppercase;padding:2px 1px;letter-spacing:.2px}
.avail-day-lbl{font-size:.59rem;font-weight:800;color:var(--text-muted);display:flex;align-items:center;padding-left:4px}
.avail-slot{width:100%;aspect-ratio:1.2;border-radius:4px;border:1.5px solid var(--border);cursor:pointer;transition:all .12s;display:flex;align-items:center;justify-content:center;font-size:.52rem;font-weight:700}
.avail-slot.free{background:#dcfce7;border-color:#86efac;color:#166534}
.avail-slot.busy{background:#fee2e2;border-color:#fca5a5;color:#991b1b}
.avail-slot.brk{background:var(--amber-light);border-color:#fde68a;color:var(--amber);cursor:default;font-size:.46rem}
.avail-slot.free:hover{background:#bbf7d0;border-color:#4ade80}
.avail-slot.busy:hover{background:#fecaca;border-color:#f87171}
.avail-legend{display:flex;gap:12px;flex-wrap:wrap;margin-top:10px}
.avail-legend-item{display:flex;align-items:center;gap:5px;font-size:.67rem;color:var(--text-muted);font-weight:600}
.avail-legend-dot{width:12px;height:12px;border-radius:3px;border:1.5px solid}
.avail-filter-bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:16px}
.avail-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;margin-bottom:18px}
.avail-stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);padding:12px 14px;box-shadow:var(--shadow-sm);text-align:center}
.avail-stat-val{font-family:'Playfair Display',serif;font-weight:900;font-size:1.4rem;color:var(--primary-light)}
.avail-stat-lbl{font-size:.6rem;color:var(--text-subtle);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-top:2px}

/* ── ADMIN MAILBOX ── */
#admin-mailbox-fab{
  position:fixed;bottom:56px;right:16px;z-index:9998;
  width:52px;height:52px;border-radius:50%;
  background:linear-gradient(135deg,var(--primary),var(--primary-light));
  color:#fff;font-size:1.35rem;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 16px rgba(26,58,92,.35);
  transition:transform .18s,box-shadow .18s;
}
#admin-mailbox-fab:hover{transform:scale(1.08);box-shadow:0 6px 24px rgba(26,58,92,.5)}
#mailbox-unread-badge{
  position:absolute;top:-3px;right:-3px;
  background:var(--red);color:#fff;
  font-size:.55rem;font-weight:900;
  width:18px;height:18px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  border:2px solid #fff;
}
#mailbox-panel{
  position:fixed;top:0;right:0;bottom:0;z-index:9997;
  width:420px;max-width:100vw;
  background:var(--surface);
  box-shadow:-8px 0 40px rgba(15,23,42,.18);
  border-left:1.5px solid var(--border);
  display:flex;flex-direction:column;
  transition:transform .28s cubic-bezier(.4,0,.2,1);
  transform:translateX(100%);
}
#mailbox-panel.open{transform:translateX(0)}
.mailbox-hdr{
  background:linear-gradient(135deg,var(--primary),var(--primary-light));
  color:#fff;padding:18px 20px;
  display:flex;align-items:center;gap:12px;flex-shrink:0;
}
.mailbox-body{flex:1;overflow-y:auto;padding:14px}
.report-card{
  background:var(--surface);border:1.5px solid var(--border);
  border-radius:var(--r);padding:14px 16px;
  margin-bottom:10px;cursor:pointer;
  transition:box-shadow .14s,border-color .14s;
}
.report-card:hover{box-shadow:var(--shadow);border-color:var(--primary-light)}
.report-card.unread{border-left:4px solid var(--primary-light);background:#f0f6ff}
.report-card.read{opacity:.75}
.report-meta{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap}
.report-body-preview{font-size:.76rem;color:var(--text-muted);line-height:1.5;
  overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.report-full-body{font-size:.78rem;color:var(--text);line-height:1.6;
  background:var(--surface2);border-radius:var(--r-sm);padding:10px 14px;margin-top:10px;
  white-space:pre-wrap;border:1px solid var(--border)}

/* ── FACULTY VIEW TABS ── */
.fac-tab-bar{display:flex;gap:2px;background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--r-sm);padding:3px;margin-bottom:18px;overflow-x:auto}
.fac-tab{padding:8px 16px;border:none;border-radius:6px;font-weight:700;font-size:.76rem;
  cursor:pointer;white-space:nowrap;background:transparent;color:var(--text-muted);
  font-family:'Plus Jakarta Sans',sans-serif;transition:all .16s}
.fac-tab.active{background:var(--surface);color:var(--primary-light);
  box-shadow:var(--shadow-sm);border:1px solid var(--border)}
.fac-tab:hover:not(.active){background:var(--surface);color:var(--text)}

/* ── REPORT FORM ── */
.report-form{background:var(--surface2);border:1.5px solid var(--border);
  border-radius:var(--r-lg);padding:20px 22px;margin-top:4px}
</style>
</head>

/* ════ UTILS ════ */
function h(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function uid(){return"u_"+Date.now()+"_"+Math.random().toString(36).slice(2,6);}
function showToast(msg,t="ok"){
  const el=document.getElementById("toast");
  const colors={ok:"#059669",warn:"#b45309",err:"#dc2626",info:"#2557a7",modify:"#6d28d9"};
  el.style.background=colors[t]||colors.ok;
  el.textContent=msg;
  el.classList.add("show");
  clearTimeout(el._t);
  el._t=setTimeout(()=>el.classList.remove("show"),3600);
}
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function fmtTs(ts){const d=new Date(ts);return d.toLocaleDateString()+' '+d.toLocaleTimeString(undefined,{hour:'2-digit',minute:'2-digit'});}

}
function toggleReportExpand(id){
  const prev=document.getElementById("rprev-"+id);
  const full=document.getElementById("rfull-"+id);
  if(!prev||!full)return;
  const isOpen=!full.classList.contains("hidden");
  prev.classList.toggle("hidden",!isOpen);
  full.classList.toggle("hidden",isOpen);
  // mark as read when opened
  const r=reports.find(x=>x.id===id);
  if(r&&!r.read&&!isOpen){markReportRead(id);}
}
async function markReportRead(id){

function renderFacultyOwnAvailability(){
  const myStaffName=(session.staffName||session.name||"").trim().toLowerCase();
  const days=branches.find(b=>b.workingDays==="mon-fri")?DAYS5:DAYS6;
  const perds=periods;
  const fac={name:session.staffName||session.name,key:myStaffName,branches:new Set()};
  const avMap=facultyAvailability[fac.key]||{};
  const nd=days.length;
  const np=perds.length;
  const blockedCount=Object.values(avMap).filter(Boolean).length;
  const teachPeriods=perds.filter(p=>!p.isBreak).length;
  const totalTeachSlots=nd*teachPeriods;

  let headerCells=`<div class="avail-day-lbl" style="grid-column:1"></div>`;
  perds.forEach((p,pi)=>{headerCells+=`<div class="avail-hdr-cell">${p.isBreak?"BRK":"P"+p.num}</div>`;});

  let dayRows="";
  for(let di=0;di<nd;di++){
    dayRows+=`<div class="avail-day-lbl">${days[di]}</div>`;
    perds.forEach((p,pi)=>{
      if(p.isBreak){dayRows+=`<div class="avail-slot brk" title="Break">B</div>`;}
      else{
        const isBlocked=!!avMap[`${di}_${pi}`];
        dayRows+=`<button class="avail-slot ${isBlocked?"busy":"free"}" title="${isBlocked?"BLOCKED — click to unblock":"Available — click to block"}"
          onclick="toggleFacultyOwnSlot('${fac.key}',${di},${pi},this)">${isBlocked?"✕":"✓"}</button>`;
      }
    });
  }
  return`
  <div class="card">
    <div class="card-hdr" style="background:linear-gradient(135deg,#1a3a5c,#2557a7)">
      <div style="font-size:1.3rem">🗓</div>
      <div style="flex:1">
        <div style="font-weight:800;font-size:.92rem;color:#fff">My Availability</div>
        <div style="font-size:.67rem;color:rgba(255,255,255,.65);margin-top:2px">Mark periods you are <b style="color:#fca5a5">unavailable</b>. The scheduler will never assign you to blocked slots.</div>
      </div>
      <button class="btn btn-green btn-sm" onclick="saveOwnAvailability()">💾 Save</button>
    </div>
    <div class="card-body">
      <div class="alert a-info" style="margin-bottom:14px">
        💡 Click <span style="background:#dcfce7;color:#166534;border:1px solid #86efac;border-radius:3px;padding:1px 5px;font-size:.72rem;font-weight:700">✓ green</span> to <b>block</b> a period. Click <span style="background:#fee2e2;color:#991b1b;border:1px solid #fca5a5;border-radius:3px;padding:1px 5px;font-size:.72rem;font-weight:700">✕ red</span> to unblock. Changes are saved to Firebase.
      </div>
      <div style="display:flex;gap:12px;margin-bottom:14px;flex-wrap:wrap">
        <div class="avail-stat" style="flex:1;min-width:100px"><div class="avail-stat-val" style="color:var(--red)">${blockedCount}</div><div class="avail-stat-lbl">Blocked</div></div>
        <div class="avail-stat" style="flex:1;min-width:100px"><div class="avail-stat-val" style="color:var(--green)">${totalTeachSlots-blockedCount}</div><div class="avail-stat-lbl">Available</div></div>
        <div class="avail-stat" style="flex:1;min-width:100px"><div class="avail-stat-val">${totalTeachSlots}</div><div class="avail-stat-lbl">Total Slots</div></div>
      </div>
      <div class="avail-legend" style="margin-bottom:14px">
        <div class="avail-legend-item"><div class="avail-legend-dot" style="background:#dcfce7;border-color:#86efac"></div>Available</div>
        <div class="avail-legend-item"><div class="avail-legend-dot" style="background:#fee2e2;border-color:#fca5a5"></div>Blocked</div>
        <div class="avail-legend-item"><div class="avail-legend-dot" style="background:var(--amber-light);border-color:#fde68a"></div>Break</div>
      </div>
      <div class="avail-faculty-card" style="max-width:520px">
        <div class="avail-fac-hdr">
          <div class="avail-fac-avatar">${(fac.name||"?")[0].toUpperCase()}</div>
          <div style="flex:1;min-width:0">
            <div style="font-weight:800;font-size:.83rem;line-height:1.2">${h(fac.name)}</div>
            <div style="font-size:.6rem;opacity:.7;margin-top:2px">${blockedCount}/${totalTeachSlots} slots blocked</div>
          </div>
        </div>
        <div class="avail-fac-body">
          <div class="avail-slot-grid" style="--n-periods:${np}">${headerCells}${dayRows}</div>
          <div style="display:flex;gap:6px;margin-top:12px;flex-wrap:wrap">
            <button class="btn btn-danger btn-xs" onclick="clearOwnAvail()">🔓 Clear All Blocks</button>
            <button class="btn btn-green btn-xs" onclick="saveOwnAvailability()">💾 Save Changes</button>
          </div>
        </div>
      </div>
    </div>
  </div>`;
}

async function toggleFacultyOwnSlot(staffKey,di,pi,btn){
  if(!facultyAvailability[staffKey])facultyAvailability[staffKey]={};
  const slotKey=`${di}_${pi}`;
  const wasBusy=!!facultyAvailability[staffKey][slotKey];
  if(wasBusy){delete facultyAvailability[staffKey][slotKey];btn.className="avail-slot free";btn.textContent="✓";}
  else{facultyAvailability[staffKey][slotKey]=true;btn.className="avail-slot busy";btn.textContent="✕";}
  clearTimeout(btn._st);btn._st=setTimeout(()=>saveOwnAvailability(true),800);
}
async function saveOwnAvailability(silent=false){
  await dbSet("jntua_fac_avail",facultyAvailability);
  if(!silent)showToast("✅ Availability saved","ok");
}
async function clearOwnAvail(){
  const key=(session.staffName||session.name||"").trim().toLowerCase();
  if(!confirm("Clear ALL your blocked slots? You will be available for all periods."))return;
  delete facultyAvailability[key];
  await saveOwnAvailability(true);
  showToast("🔓 All your constraints cleared","ok");
  facultyTab="availability";renderFacultyView();
}

/* ── Admin access: click the JNTUACEA logo 3 times within 2s to open admin login ── */
let _logoClicks=0,_logoTimer=null;
function handleLogoClick(){
  _logoClicks++;
  clearTimeout(_logoTimer);
  if(_logoClicks>=3){_logoClicks=0;openStaffLogin('admin');return;}
  _logoTimer=setTimeout(()=>{_logoClicks=0;},2000);
}

function openStaffLogin(roleHint){
  document.getElementById("modal-container").innerHTML=`
    <div class="modal-bg" onclick="closeModal(event)">
      <div class="modal fade-in" onclick="event.stopPropagation()">
        <h3>${roleHint==="admin"?"🔑 Admin / HOD Login":"👩‍🏫 Faculty Login"}</h3>
        <div id="l-err" class="alert a-err hidden"></div>
        <div class="fg"><label class="lbl">Username</label><input id="l-u" placeholder="e.g. admin" onkeydown="if(event.key==='Enter')doLogin()"/></div>
        <div class="fg"><label class="lbl">Password</label><input id="l-p" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"/></div>
        <div class="flex" style="margin-top:14px;gap:8px">
          <button class="btn btn-primary" style="flex:1;justify-content:center" onclick="doLogin()">🔓 Sign In</button>
          <button class="btn btn-outline" onclick="document.getElementById('modal-container').innerHTML=''">Cancel</button>
        </div>
      </div>
    </div>`;
  setTimeout(()=>document.getElementById("l-u")?.focus(),50);
}

async function doLogin(){
  const un=(document.getElementById("l-u")?.value||"").trim();
  const pw=document.getElementById("l-p")?.value||"";
  const found=users.find(x=>x.username===un&&x.password===pw);
  const err=document.getElementById("l-err");
  if(!found){if(err){err.textContent="⚠️ Invalid username or password.";err.classList.remove("hidden");}return;}
  if(found.role==="student"){if(err){err.textContent="⚠️ Students use the open-access portal.";err.classList.remove("hidden");}return;}
  if(err)err.classList.add("hidden");
  document.getElementById("modal-container").innerHTML="";
  session=found;
  showToast(`✅ Welcome, ${found.name}!`);routeByRole();
}

/* ════ STUDENT BROWSE ════ */
function renderStudentBrowse(){
  const el=document.getElementById("v-student-browse");
  const stepIdx=studentBrowse.step==="branch"?0:studentBrowse.step==="section"?1:2;
  const steps=["Choose Branch","Choose Section","View Timetable"];
  const stepHtml=steps.map((s,i)=>`
    <div style="display:flex;align-items:center;gap:6px">
      <div style="width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.67rem;font-weight:800;
        ${i<stepIdx?"background:var(--green);color:#fff":i===stepIdx?"background:var(--primary-light);color:#fff":"background:var(--surface2);color:var(--text-subtle)"}">
        ${i<stepIdx?"✓":i+1}
      </div>
      <span style="font-size:.72rem;font-weight:700;color:${i===stepIdx?"var(--primary)":i<stepIdx?"var(--text-muted)":"var(--text-subtle)"}">${s}</span>
      ${i<steps.length-1?`<span style="color:var(--border-strong);margin:0 2px">›</span>`:""}
    </div>`).join("");

  let content="";
  if(studentBrowse.step==="branch"){
    content=`
      <div style="color:var(--text-muted);font-size:.77rem;margin-bottom:16px">Select your branch or department:</div>
      <div class="branch-grid">
        ${branches.map(br=>{
          const hasTT=timetables.some(t=>t.branch.id===br.id);

function autoFillStaffName(){

  const nameEl=document.getElementById("mu-name");
  const staffEl=document.getElementById("mu-staffname");
  if(nameEl&&staffEl&&!staffEl.dataset.userEdited){

async function saveNewUser(){
  const name=document.getElementById("mu-name").value.trim();
  const username=document.getElementById("mu-uname").value.trim();
  const password=document.getElementById("mu-pass").value;
  const email=document.getElementById("mu-email").value.trim();
  const role=document.getElementById("mu-role").value;
  const branchChecks=[...document.querySelectorAll('input[name="mu-branch"]:checked')].map(c=>c.value);
  const branch=branchChecks.join(",");
  const staffNameEl=document.getElementById("mu-staffname");
  const staffName=staffNameEl?staffNameEl.value.trim():"";
  const errEl=document.getElementById("mu-err");
  if(!name||!username||!password){errEl.textContent="⚠️ Name, username & password are required.";errEl.classList.remove("hidden");return;}
  if(!/^[a-zA-Z0-9_.\-]+$/.test(username)){errEl.textContent="⚠️ Username may only contain letters, numbers, underscores, hyphens or dots.";errEl.classList.remove("hidden");return;}
  if(password.length<6){errEl.textContent="⚠️ Password must be at least 6 characters.";errEl.classList.remove("hidden");return;}
  if(email&&!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){errEl.textContent="⚠️ Please enter a valid email address.";errEl.classList.remove("hidden");return;}
  if(users.find(u=>u.username.toLowerCase()===username.toLowerCase())){errEl.textContent="⚠️ Username already exists. Please choose a different one.";errEl.classList.remove("hidden");return;}
  if(email&&users.find(u=>u.email&&u.email.toLowerCase()===email.toLowerCase())){errEl.textContent="⚠️ An account with this email already exists.";errEl.classList.remove("hidden");return;}
  if(role==="faculty"&&!staffName){errEl.textContent="⚠️ Staff Name is required for faculty accounts (used to match timetable assignments).";errEl.classList.remove("hidden");return;}
  const allFacultyStaff=[...new Set(branches.flatMap(b=>b.subjects.flatMap(s=>parseStaff(s.staff||""))).filter(Boolean))];
  if(role==="faculty"&&staffName&&!allFacultyStaff.some(n=>n.toLowerCase()===staffName.toLowerCase())){errEl.textContent="⚠️ Staff Name does not match any existing subject assignment. Check spelling or add the subject first.";errEl.classList.remove("hidden");return;}
  users.push({id:uid(),username,password,role,name,branch,section:"",email,staffName:staffName||name});
  await dbSet("jntua_users_v2",users);
  document.getElementById("modal-container").innerHTML="";
  showToast(`✅ ${role} account created: @${username}${staffName?" — linked to "+staffName:""}`);renderAdmin();
}

              ${branches.length?branches.map(b=>`<label style="display:flex;align-items:center;gap:5px;font-size:.73rem;font-weight:600;background:var(--surface);border:1.5px solid var(--border);border-radius:6px;padding:5px 10px;cursor:pointer;transition:all .12s" onmouseover="this.style.borderColor='var(--primary-light)'" onmouseout="this.style.borderColor='var(--border)'">

        </div>

async function saveEditUser(id){
  const u=users.find(x=>x.id===id);if(!u)return;
  const name=document.getElementById("eu-name").value.trim();
  const password=document.getElementById("eu-pass").value;
  const email=document.getElementById("eu-email").value.trim();
  const branch=[...document.querySelectorAll('input[name="eu-branch"]:checked')].map(c=>c.value).join(",");
  const staffNameEl=document.getElementById("eu-staffname");
  const staffName=staffNameEl?staffNameEl.value.trim():"";
  const errEl=document.getElementById("eu-err");
  if(!name){errEl.textContent="⚠️ Name is required.";errEl.classList.remove("hidden");return;}
  if(password.length<6){errEl.textContent="⚠️ Password must be at least 6 chars.";errEl.classList.remove("hidden");return;}
  if(email&&!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){errEl.textContent="⚠️ Please enter a valid email address.";errEl.classList.remove("hidden");return;}
  if(email&&users.find(x=>x.id!==id&&x.email&&x.email.toLowerCase()===email.toLowerCase())){errEl.textContent="⚠️ Another account with this email already exists.";errEl.classList.remove("hidden");return;}
  if(u.role==="faculty"&&staffNameEl&&!staffName){errEl.textContent="⚠️ Staff Name is required for faculty accounts.";errEl.classList.remove("hidden");return;}
  const allFacStaff=[...new Set(branches.flatMap(b=>b.subjects.flatMap(s=>parseStaff(s.staff||""))).filter(Boolean))];
  if(u.role==="faculty"&&staffNameEl&&staffName&&allFacStaff.length>0&&!allFacStaff.some(n=>n.toLowerCase()===staffName.toLowerCase())){errEl.textContent="⚠️ Staff Name does not match any existing subject assignment. Check spelling or update the subject first.";errEl.classList.remove("hidden");return;}
  const updates={name,password,email,branch};
  if(staffNameEl)updates.staffName=staffName||name;
  Object.assign(u,updates);
  await dbSet("jntua_users_v2",users);
  document.getElementById("modal-container").innerHTML="";
  showToast(`✅ User updated: ${name}${staffName?" — staff: "+staffName:""}`);renderAdmin();
}

/* ════ FACULTY AVAILABILITY MANAGEMENT MODULE ════
   Provides:
   ① renderFacultyAvailability()  — Admin UI: per-faculty day×period grid
   ② toggleAvailSlot()            — Click handler to flip free↔blocked
   ③ saveAvailability()           — Persist to Firebase under "jntua_fac_avail"
   ④ clearFacultyAvail()          — Reset one faculty's constraints
   ⑤ isSlotAvailable()            — Query function consumed by scheduler
   ⑥ Integration in conflictCheck() — adds availability as a hard constraint
══════════════════════════════════════════════════════════════ */

/* ── Collect all unique faculty from registered users only ── */
function getAllFaculty(){
  const facultyUsers=users.filter(u=>u.role==="faculty"&&(u.staffName||u.name));
  if(!facultyUsers.length)return[];
  const configuredBranches=branches;
  return facultyUsers.map(u=>{
    const name=(u.staffName||u.name).trim();
    const key=name.toLowerCase();
    const branchSet=new Set();
    configuredBranches.forEach(br=>{
      if(br.subjects.some(s=>parseStaff(s.staff||"").some(sn=>sn.toLowerCase().trim()===key)))
        branchSet.add(br.name);
    });
    return{name,key,branches:branchSet};
  }).sort((a,b)=>a.name.localeCompare(b.name));
}

/* ── Check if a faculty is available at di/pi ── */
function isSlotAvailable(staffName,di,pi){
  const key=(staffName||"").toLowerCase().trim();
  if(!key)return true;
  const avMap=facultyAvailability[key];
  if(!avMap)return true;  // no constraints = always available
  return !avMap[`${di}_${pi}`];  // true = available, false = blocked
}

/* ── Toggle one slot for a faculty ── */
async function toggleAvailSlot(staffKey,di,pi,btn){
  if(!facultyAvailability[staffKey])facultyAvailability[staffKey]={};
  const slotKey=`${di}_${pi}`;
  const wasBusy=!!facultyAvailability[staffKey][slotKey];
  if(wasBusy){
    delete facultyAvailability[staffKey][slotKey];
    btn.className="avail-slot free";
    btn.title="Available — click to block";
    btn.textContent="✓";
  } else {
    facultyAvailability[staffKey][slotKey]=true;
    btn.className="avail-slot busy";
    btn.title="BLOCKED — click to unblock";
    btn.textContent="✕";
  }
  // Debounced auto-save
  clearTimeout(btn._saveTimer);
  btn._saveTimer=setTimeout(()=>saveAvailability(true),800);
}

/* ── Save availability to Firebase ── */
async function saveAvailability(silent=false){
  await dbSet("jntua_fac_avail",facultyAvailability);
  if(!silent)showToast("✅ Faculty availability saved to Firebase","ok");
}

/* ── Clear all blocked slots for one faculty ── */
async function clearFacultyAvail(staffKey,facName){
  if(!confirm(`Clear ALL blocked slots for ${facName}?\nThey will be available for all periods.`))return;
  delete facultyAvailability[staffKey];
  await saveAvailability(true);
  showToast(`🔓 All constraints cleared for ${facName}`,"ok");
  renderAdmin();
}

/* ── Mark all slots of one faculty as blocked ── */
async function blockAllSlots(staffKey,facName,days,perds){
  if(!confirm(`Block ALL teaching slots for ${facName}?\nThis will prevent any assignment.`))return;
  if(!facultyAvailability[staffKey])facultyAvailability[staffKey]={};
  const nd=days.length;
  for(let di=0;di<nd;di++){
    perds.forEach((p,pi)=>{
      if(!p.isBreak)facultyAvailability[staffKey][`${di}_${pi}`]=true;
    });
  }
  await saveAvailability(true);

  renderAdmin();
}

/* ════ ENHANCED SCHEDULER v2 — SOFT-CONSTRAINT OPTIMISER ════
   Hard constraints (unchanged — never violated):
     H1  Faculty double-booking across sections/branches
     H2  Faculty availability blocks set by admin

   Soft constraints now minimised during placement AND post-optimisation:
     S1  Faculty > 3 consecutive periods on same day       penalty 8 per extra period
     S2  Same subject appearing > 1 time on the same day   penalty 5 per extra copy
     S3  Back-to-back lab blocks (same faculty, same day)  penalty 6 per extra block
     S4  Subject never spread across all available days     penalty 2 per missing day
         (uneven week distribution)

   Pipeline per class:
     Phase 1 – Labs placed with S3-aware day selection
     Phase 2 – Theory placed with scored greedy (S1+S2+S4 cost per candidate slot)
     Phase 3 – Repair pass fills any remaining gaps
     Phase 4 – Local-search: pairwise swaps that reduce soft score (3 passes)
══════════════════════════════════════════════════════════════ */

/* ── Global assigned-slot registry {staffKey: Set<"di_pi">} ── */
let _globalAssignedSlots = {};
function getAssignedSlotsSnapshot(){ return _globalAssignedSlots; }

/* ── Soft-score report populated each run, read by doGenerate toast ── */
let _lastSoftReport = {totalScore:0, details:[]};

/* ── afternoon/morning period split (unchanged) ── */
function afternoonSlots(perds){
  let lunchIdx=-1;
  for(let i=0;i<perds.length;i++){if(perds[i].isBreak){lunchIdx=i;break;}}
  const teachSlots=perds.map((_,i)=>i).filter(i=>!perds[i].isBreak);
  if(lunchIdx===-1){
    const half=Math.floor(teachSlots.length/2);
    return{all:teachSlots,afternoon:teachSlots.slice(half),morning:teachSlots.slice(0,half)};
  }
  return{
    all:teachSlots,
    afternoon:perds.map((_,i)=>i).filter(i=>i>lunchIdx&&!perds[i].isBreak),
    morning:perds.map((_,i)=>i).filter(i=>i<lunchIdx&&!perds[i].isBreak)
  };
}

/* ── Hard-constraint check (H1+H2, unchanged logic) ── */
function conflictCheck(assignedSlots,staff,di,pi){
  const key=(staff||"").toLowerCase().trim();
  if(!key)return true;
  if(assignedSlots[key]&&assignedSlots[key].has(`${di}_${pi}`))return false;
  if(!isSlotAvailable(staff,di,pi))return false;
  return true;
}

/* ── Mark / unmark helpers ── */
function markAssigned(assignedSlots,staff,di,pi){
  const key=(staff||"").toLowerCase().trim();
  if(!key)return;
  if(!assignedSlots[key])assignedSlots[key]=new Set();
  assignedSlots[key].add(`${di}_${pi}`);
}
function unmarkAssigned(assignedSlots,staff,di,pi){
  const key=(staff||"").toLowerCase().trim();
  if(assignedSlots[key])assignedSlots[key].delete(`${di}_${pi}`);
}

/* ═══════════════════════════════════════════════════
   SOFT SCORING  — evaluates a fully-placed class grid
   ═══════════════════════════════════════════════════ */
function softScore(grid,subjects,perds,nd,assignedSlots){
  const teachSlots=perds.map((_,i)=>i).filter(i=>!perds[i].isBreak);
  let score=0;

  /* S1 — consecutive-period run > 3 for each faculty (global registry) */
  const seenStaff=new Set();
  subjects.forEach(s=>{
    const key=(s.staff||"").toLowerCase().trim();
    if(!key||seenStaff.has(key))return;
    seenStaff.add(key);
    const slots=assignedSlots[key];
    if(!slots)return;
    for(let di=0;di<nd;di++){
      let run=0,maxRun=0;
      teachSlots.forEach(pi=>{
        if(slots.has(`${di}_${pi}`)){run++;if(run>maxRun)maxRun=run;}
        else run=0;
      });
      if(maxRun>3)score+=8*(maxRun-3);
    }
  });

  /* S2 — same theory subject > 1 time on same day */
  subjects.filter(s=>s.type!=="lab").forEach(s=>{
    for(let di=0;di<nd;di++){
      let c=0;
      teachSlots.forEach(pi=>{if((grid[di]||{})[pi]===s.abbr)c++;});
      if(c>1)score+=5*(c-1);
    }
  });

  /* S3 — same faculty has > 1 lab block on same day */
  const facLabBlocks={};
  subjects.filter(s=>s.type==="lab").forEach(s=>{
    const fkey=(s.staff||"").toLowerCase().trim();
    if(!facLabBlocks[fkey])facLabBlocks[fkey]=new Array(nd).fill(0);
    for(let di=0;di<nd;di++){
      let run=0,blocks=0;
      perds.forEach((p,pi)=>{
        if(!p.isBreak&&(grid[di]||{})[pi]===s.abbr){run++;}
        else{blocks+=Math.floor(run/3);run=0;}
      });
      blocks+=Math.floor(run/3);
      facLabBlocks[fkey][di]+=blocks;
    }
  });
  Object.values(facLabBlocks).forEach(arr=>{
    arr.forEach(cnt=>{if(cnt>1)score+=6*(cnt-1);});
  });

  /* S4 — subject not spread across all days (uneven distribution) */
  subjects.filter(s=>s.type!=="lab").forEach(s=>{
    const daysWithSubj=new Set();
    for(let di=0;di<nd;di++)
      teachSlots.forEach(pi=>{if((grid[di]||{})[pi]===s.abbr)daysWithSubj.add(di);});
    const ideal=Math.min(s.hrs||3,nd);
    if(daysWithSubj.size<ideal)score+=2*(ideal-daysWithSubj.size);
  });

  /* S5 — reward keeping theory in same room type per day (reduce switches) */
  for(let di=0;di<nd;di++){
    let theoryCt=0;
    teachSlots.forEach(pi=>{
      const abbr=(grid[di]||{})[pi];
      if(abbr){const sub=subjects.find(s=>s.abbr===abbr);if(sub&&sub.type!=='lab')theoryCt++;}
    });
    if(theoryCt>0&&theoryCt>1)score+=Math.max(0,theoryCt-5)*1;
  }

  return score;
}

/* ═══════════════════════════════════════════════════
   MARGINAL COST of placing subject s at (di,pi)
   Used by scored greedy in Phase 2.
   ═══════════════════════════════════════════════════ */
function marginalCost(grid,s,perds,nd,assignedSlots,di,pi){
  const teachSlots=perds.map((_,i)=>i).filter(i=>!perds[i].isBreak);
  const key=(s.staff||"").toLowerCase().trim();
  let cost=0;

  /* S1 marginal: how long would the run through (di,pi) become? */
  if(key&&assignedSlots[key]){
    const idx=teachSlots.indexOf(pi);
    let run=1;
    for(let k=idx-1;k>=0;k--){if(assignedSlots[key].has(`${di}_${teachSlots[k]}`))run++;else break;}
    for(let k=idx+1;k<teachSlots.length;k++){if(assignedSlots[key].has(`${di}_${teachSlots[k]}`))run++;else break;}
    if(run>3)cost+=8*(run-3);
    else if(run===3)cost+=4; /* nudge: one more step hits limit */
  }

  /* S2 marginal: subject already on this day? */
  let sameDay=0;
  teachSlots.forEach(p2=>{if((grid[di]||{})[p2]===s.abbr)sameDay++;});
  if(sameDay>=1)cost+=5*sameDay;

  /* S4 marginal: reward spreading to a new day */
  const daysUsed=new Set();
  for(let d=0;d<nd;d++)
    teachSlots.forEach(p2=>{if((grid[d]||{})[p2]===s.abbr)daysUsed.add(d);});
  if(!daysUsed.has(di))cost-=2; /* negative = reward */

  /* tiny jitter to break ties */
  cost+=Math.random()*0.3;
  return cost;
}

/* ═══════════════════════════════════════════════════
   LOCAL-SEARCH OPTIMISER
   After greedy placement: attempt pairwise swaps of theory
   slots that strictly reduce softScore without hard violations.
   Runs up to maxPasses improving sweeps.
   ═══════════════════════════════════════════════════ */
function optimiseGrid(grid,subjects,perds,nd,assignedSlots,maxPasses){
  const{all:teachSlots}=afternoonSlots(perds);
  const subMap={};
  subjects.forEach(s=>{if(s.abbr)subMap[s.abbr.toUpperCase()]=s;});

  for(let pass=0;pass<maxPasses;pass++){
    /* collect all theory-filled slots */
    const filled=[];
    for(let di=0;di<nd;di++)
      teachSlots.forEach(pi=>{
        const abbr=(grid[di]||{})[pi];
        if(abbr){const s=subMap[abbr.toUpperCase()];if(s&&s.type!=="lab")filled.push({di,pi,abbr,s});}
      });
    shuffle(filled);

    let improved=false;
    outer:
    for(let i=0;i<filled.length;i++){
      for(let j=i+1;j<filled.length;j++){
        const a=filled[i],b=filled[j];
        if(a.abbr===b.abbr)continue;          /* same subject, no gain */
        if(a.di===b.di&&a.pi===b.pi)continue;

        const before=softScore(grid,subjects,perds,nd,assignedSlots);

        /* tentatively unmark both */
        unmarkAssigned(assignedSlots,a.s.staff,a.di,a.pi);
        unmarkAssigned(assignedSlots,b.s.staff,b.di,b.pi);

        const canSwap=
          conflictCheck(assignedSlots,a.s.staff,b.di,b.pi)&&
          conflictCheck(assignedSlots,b.s.staff,a.di,a.pi);

        if(canSwap){
          grid[a.di][a.pi]=b.abbr; grid[b.di][b.pi]=a.abbr;
          markAssigned(assignedSlots,a.s.staff,b.di,b.pi);
          markAssigned(assignedSlots,b.s.staff,a.di,a.pi);

          if(softScore(grid,subjects,perds,nd,assignedSlots)<before){
            improved=true; break outer; /* accept, restart pass */
          }
          /* revert swap */
          grid[a.di][a.pi]=a.abbr; grid[b.di][b.pi]=b.abbr;
          unmarkAssigned(assignedSlots,a.s.staff,b.di,b.pi);
          unmarkAssigned(assignedSlots,b.s.staff,a.di,a.pi);
          markAssigned(assignedSlots,a.s.staff,a.di,a.pi);
          markAssigned(assignedSlots,b.s.staff,b.di,b.pi);
        } else {
          /* restore marks undone above */
          markAssigned(assignedSlots,a.s.staff,a.di,a.pi);
          markAssigned(assignedSlots,b.s.staff,b.di,b.pi);
        }
      }
    }
    if(!improved)break;
  }
}

/* ═══════════════════════════════════════════════════
   REPAIR PASS — fills unplaced hours (unchanged logic)
   ═══════════════════════════════════════════════════ */
function repairGrid(grid,subjects,perds,nd,assignedSlots,log){
  const{all:teachSlots,afternoon,morning}=afternoonSlots(perds);

  subjects.filter(s=>s.type!=="lab").forEach(s=>{
    const placed=countPlaced(grid,s.abbr,nd,perds);
    let rem=(s.hrs||3)-placed;
    if(rem<=0)return;
    log.push(`REPAIR: ${s.abbr} needs ${rem} more slot(s)`);
    const allCombos=[];
    for(let di=0;di<nd;di++)for(const pi of teachSlots)allCombos.push([di,pi]);
    shuffle(allCombos).forEach(([di,pi])=>{
      if(rem<=0)return;
      if(!grid[di][pi]&&conflictCheck(assignedSlots,s.staff,di,pi)){
        grid[di][pi]=s.abbr;markAssigned(assignedSlots,s.staff,di,pi);rem--;
      }
    });
    if(rem>0)log.push(`  ⚠ Could not place ${rem} hour(s) for ${s.abbr} (faculty conflict)`);
  });

  subjects.filter(s=>s.type==="lab").forEach(s=>{
    const placed=countLabBlocksPlaced(grid,s.abbr,nd,perds);
    const blocks=Math.floor((s.hrs||3)/3);
    let rem=blocks-placed;
    if(rem<=0)return;
    log.push(`REPAIR: Lab ${s.abbr} needs ${rem} more block(s)`);
    for(let b=0;b<rem;b++){
      let done=false;
      for(const slotSet of[afternoon,morning,teachSlots]){
        if(done)break;
        for(const di of shuffle([...Array(nd).keys()])){
          if(done)break;
          for(let k=0;k<=slotSet.length-3&&!done;k++){
            const trio=[slotSet[k],slotSet[k+1],slotSet[k+2]];
            if(trio[1]!==trio[0]+1||trio[2]!==trio[1]+1)continue;
            if(trio.every(pi=>!grid[di][pi]&&conflictCheck(assignedSlots,s.staff,di,pi))){
              trio.forEach(pi=>{grid[di][pi]=s.abbr;markAssigned(assignedSlots,s.staff,di,pi);});done=true;
            }
          }
        }
      }
      if(!done)log.push(`  ⚠ Could not place repair block for ${s.abbr}`);
    }
  });
}

/* ── Count helpers (unchanged) ── */
function countPlaced(grid,abbr,nd,perds){
  let c=0;
  for(let di=0;di<nd;di++)for(let pi=0;pi<perds.length;pi++)if(!perds[pi].isBreak&&grid[di][pi]===abbr)c++;
  return c;
}
function countLabBlocksPlaced(grid,abbr,nd,perds){
  let c=0;
  for(let di=0;di<nd;di++){
    let run=0;
    for(let pi=0;pi<perds.length;pi++){
      if(!perds[pi].isBreak&&grid[di][pi]===abbr)run++;
      else{c+=Math.floor(run/3);run=0;}
    }
    c+=Math.floor(run/3);
  }
  return c;
}

/* ── marginalCost for multi-faculty subject ── */
function marginalCostMulti(grid,s,staffList,perds,nd,assignedSlots,di,pi){
  // Use the least-loaded available faculty to compute cost (same logic as single)
  const chosen=pickFaculty(staffList,assignedSlots,di,pi);
  if(!chosen)return 9999;
  const sProxy={...s,staff:chosen};
  return marginalCost(grid,sProxy,perds,nd,assignedSlots,di,pi);
}

/* ── Repair pass for multi-faculty timetables ── */
function repairGridMulti(grid,roomGrid,facGrid,subjects,perds,nd,assignedSlots,theoryRoom,brName,log){
  const{all:teachSlots,afternoon,morning}=afternoonSlots(perds);

  subjects.filter(s=>s.type!=="lab").forEach(s=>{
    const staffList=parseStaff(s.staff);
    const placed=countPlaced(grid,s.abbr,nd,perds);
    let rem=(s.hrs||3)-placed;
    if(rem<=0)return;
    log.push(`REPAIR: ${s.abbr} needs ${rem} more slot(s)`);
    const allCombos=[];
    for(let di=0;di<nd;di++)for(const pi of teachSlots)allCombos.push([di,pi]);
    shuffle(allCombos).forEach(([di,pi])=>{
      if(rem<=0)return;
      if(!grid[di][pi]){
        const chosen=pickFaculty(staffList,assignedSlots,di,pi);
        if(chosen){
          grid[di][pi]=s.abbr;roomGrid[di][pi]=theoryRoom;facGrid[di][pi]=chosen;
          markAssigned(assignedSlots,chosen,di,pi);rem--;
        }
      }
    });
    if(rem>0)log.push(`  ⚠ Could not place ${rem} hour(s) for ${s.abbr} (faculty conflict)`);
  });

  subjects.filter(s=>s.type==="lab").forEach(s=>{
    const staffList=parseStaff(s.staff);
    const labRoom=getLabRoom(s,brName);
    const placed=countLabBlocksPlaced(grid,s.abbr,nd,perds);
    const blocks=Math.floor((s.hrs||3)/3);
    let rem=blocks-placed;
    if(rem<=0)return;
    log.push(`REPAIR: Lab ${s.abbr} needs ${rem} more block(s)`);
    for(let b=0;b<rem;b++){
      let done=false;
      for(const slotSet of[afternoon,morning,teachSlots]){
        if(done)break;
        for(const di of shuffle([...Array(nd).keys()])){
          if(done)break;
          for(let k=0;k<=slotSet.length-3&&!done;k++){
            const trio=[slotSet[k],slotSet[k+1],slotSet[k+2]];
            if(trio[1]!==trio[0]+1||trio[2]!==trio[1]+1)continue;
            const roomOk=trio.every(pi=>labRoomFree(labRoom,di,pi));
            if(!roomOk)continue;
            const chosenFac=staffList.find(name=>trio.every(pi=>conflictCheck(assignedSlots,name,di,pi)));
            if(chosenFac&&trio.every(pi=>!grid[di][pi])){
              trio.forEach(pi=>{
                grid[di][pi]=s.abbr;roomGrid[di][pi]=labRoom;facGrid[di][pi]=chosenFac;
                markAssigned(assignedSlots,chosenFac,di,pi);markLabRoom(labRoom,di,pi);
              });done=true;
            }
          }
        }
      }
      if(!done)log.push(`  ⚠ Could not place repair block for ${s.abbr}`);
    }
  });
}

/* ── Local-search optimiser for multi-faculty timetables ── */
function optimiseGridMulti(grid,roomGrid,facGrid,subjects,perds,nd,assignedSlots,theoryRoom,maxPasses=3){
  const{all:teachSlots}=afternoonSlots(perds);
  const subMap={};
  subjects.forEach(s=>{if(s.abbr)subMap[s.abbr.toUpperCase()]=s;});

  for(let pass=0;pass<maxPasses;pass++){
    const filled=[];
    for(let di=0;di<nd;di++)
      teachSlots.forEach(pi=>{
        const abbr=(grid[di]||{})[pi];
        if(abbr){const s=subMap[abbr.toUpperCase()];if(s&&s.type!=="lab")filled.push({di,pi,abbr,s,fac:facGrid[di][pi]});}
      });
    shuffle(filled);
    let improved=false;
    outer:
    for(let i=0;i<filled.length;i++){
      for(let j=i+1;j<filled.length;j++){
        const a=filled[i],b=filled[j];
        if(a.abbr===b.abbr)continue;
        if(a.di===b.di&&a.pi===b.pi)continue;
        const before=softScore(grid,subjects,perds,nd,assignedSlots);
        const aList=parseStaff(a.s.staff),bList=parseStaff(b.s.staff);
        unmarkAssigned(assignedSlots,a.fac,a.di,a.pi);
        unmarkAssigned(assignedSlots,b.fac,b.di,b.pi);
        const newA=pickFaculty(aList,assignedSlots,b.di,b.pi);
        const newB=pickFaculty(bList,assignedSlots,a.di,a.pi);
        if(newA&&newB){
          grid[a.di][a.pi]=b.abbr;grid[b.di][b.pi]=a.abbr;
          facGrid[a.di][a.pi]=newB;facGrid[b.di][b.pi]=newA;
          markAssigned(assignedSlots,newA,b.di,b.pi);
          markAssigned(assignedSlots,newB,a.di,a.pi);
          if(softScore(grid,subjects,perds,nd,assignedSlots)<before){
            improved=true;break outer;
          }
          // revert
          grid[a.di][a.pi]=a.abbr;grid[b.di][b.pi]=b.abbr;
          facGrid[a.di][a.pi]=a.fac;facGrid[b.di][b.pi]=b.fac;
          unmarkAssigned(assignedSlots,newA,b.di,b.pi);
          unmarkAssigned(assignedSlots,newB,a.di,a.pi);
          markAssigned(assignedSlots,a.fac,a.di,a.pi);
          markAssigned(assignedSlots,b.fac,b.di,b.pi);
        } else {
          markAssigned(assignedSlots,a.fac,a.di,a.pi);
          markAssigned(assignedSlots,b.fac,b.di,b.pi);
        }
      }
    }
    if(!improved)break;
  }
}

/* ═══════════════════════════════════════════════════
   MAIN SCHEDULER
     Phase 1 — Labs  (S3-aware: one lab-block per faculty per day preferred)
     Phase 2 — Theory (scored greedy: marginalCost ranks candidates)
     Phase 3 — Repair (fills any gaps)
     Phase 4 — Local-search optimise (pairwise swaps, 3 passes)

   Multi-faculty: subject.staff may be "Dr. A, Dr. B" — scheduler picks
   the least-busy available faculty from the list per slot.

   Room assignment:
     Theory  → classRoom  = "<BranchName> – Sec <SEC>"  (one per class)
     Lab     → labRoom    = subject.labRoom || "<BranchName> Lab-<N>"
               Lab rooms tracked globally so two classes never share
               the same lab room at the same slot.
   ═══════════════════════════════════════════════════ */

/* ── Parse staff field into array of names ── */
function parseStaff(staffStr){
  return (staffStr||"").split(",").map(s=>s.trim()).filter(Boolean);
}

/* ── Pick best available faculty from list for (di,pi) ──
   "Best" = available + least total assigned slots (global load balancing) */
function pickFaculty(staffList,assignedSlots,di,pi){
  const avail=staffList.filter(name=>conflictCheck(assignedSlots,name,di,pi));
  if(!avail.length)return null;
  // Sort by current global load (ascending) so we balance across faculty
  avail.sort((a,b)=>{
    const ka=a.toLowerCase().trim(), kb=b.toLowerCase().trim();
    const la=(assignedSlots[ka]||new Set()).size;
    const lb=(assignedSlots[kb]||new Set()).size;
    return la-lb;
  });
  return avail[0];
}

/* ── Conflict check extended: checks all faculty in list ─
   Returns true only if at least one faculty from list is free */
function anyFacultyFree(staffList,assignedSlots,di,pi){
  return staffList.some(name=>conflictCheck(assignedSlots,name,di,pi));
}

/* ── Lab room tracker: {roomKey → Set<"di_pi">} ── */
let _labRoomSlots={};

/* ── Check lab room is free at (di,pi) ── */
function labRoomFree(roomKey,di,pi){
  const s=_labRoomSlots[roomKey];
  return !s||!s.has(`${di}_${pi}`);
}
function markLabRoom(roomKey,di,pi){
  if(!_labRoomSlots[roomKey])_labRoomSlots[roomKey]=new Set();
  _labRoomSlots[roomKey].add(`${di}_${pi}`);
}
function unmarkLabRoom(roomKey,di,pi){
  if(_labRoomSlots[roomKey])_labRoomSlots[roomKey].delete(`${di}_${pi}`);
}

/* ── Auto-generate lab room name if not specified ── */
let _labRoomCounter={};
function getLabRoom(subj,brName){
  if(subj.labRoom&&subj.labRoom.trim())return subj.labRoom.trim();
  const key=`${brName}|${subj.abbr}`;
  if(!_labRoomCounter[key]){
    // Assign a sequential lab number per branch
    const existing=Object.keys(_labRoomCounter).filter(k=>k.startsWith(brName+"|")).length;
    _labRoomCounter[key]=`${brName} Lab-${existing+1}`;
  }
  return _labRoomCounter[key];
}

function scheduler(active,perds){
  _globalAssignedSlots={};
  _labRoomSlots={};
  _labRoomCounter={};
  const assignedSlots=_globalAssignedSlots;
  const repairLog=[];
  const hrsReport=[];    // weekly hours satisfaction
  const capacityWarns=[];// capacity check warnings
  const res={};           // { brId: { sec: { grid, roomGrid, assignedFacGrid } } }
  _lastSoftReport={totalScore:0,details:[]};

  active.forEach(br=>{
    const days=br.workingDays==="mon-fri"?DAYS5:DAYS6;
    const nd=days.length;
    const{all:teachSlots,afternoon,morning}=afternoonSlots(perds);
    const classRoom=`${br.name} – Sec`;   // append section when used

    res[br.id]={};
    br.sections.forEach(sec=>{

      /* initialise empty grids */
      const grid={};
      const roomGrid={};       // di → { pi: roomName }
      const facGrid={};        // di → { pi: chosenFacultyName }
      for(let d=0;d<nd;d++){
        grid[d]={};roomGrid[d]={};facGrid[d]={};
        for(let p=0;p<perds.length;p++){grid[d][p]="";roomGrid[d][p]="";facGrid[d][p]="";}
      }
      res[br.id][sec]={grid,roomGrid,facGrid};

      const theoryRoom=`${classRoom} ${sec}`;

      /* ── Phase 1: Labs ── */
      const labDaysUsed={};
      br.subjects.filter(s=>s.type==="lab").forEach(s=>{
        const staffList=parseStaff(s.staff);
        const labRoom=getLabRoom(s,br.name);
        if(!labDaysUsed[labRoom])labDaysUsed[labRoom]=new Set();
        const blocks=Math.floor((s.hrs||3)/3);
        for(let b=0;b<blocks;b++){
          let done=false;
          const allDayIdxs=shuffle([...Array(nd).keys()]);
          const ordered=[
            ...allDayIdxs.filter(di=>!labDaysUsed[labRoom].has(di)),
            ...allDayIdxs.filter(di=> labDaysUsed[labRoom].has(di))
          ];
          for(const pool of[afternoon,teachSlots]){
            if(done)break;
            for(const di of ordered){
              if(done)break;
              for(let k=0;k<=pool.length-3&&!done;k++){
                const trio=[pool[k],pool[k+1],pool[k+2]];
                if(trio[1]!==trio[0]+1||trio[2]!==trio[1]+1)continue;
                // All 3 slots: lab room free + at least one faculty free for all 3
                const roomOk=trio.every(pi=>labRoomFree(labRoom,di,pi));
                if(!roomOk)continue;
                // For each slot in trio, pick a (consistent) faculty free at all 3
                const chosenFac=staffList.find(name=>
                  trio.every(pi=>conflictCheck(assignedSlots,name,di,pi))
                );
                if(chosenFac&&trio.every(pi=>!grid[di][pi])){
                  trio.forEach(pi=>{
                    grid[di][pi]=s.abbr;
                    roomGrid[di][pi]=labRoom;
                    facGrid[di][pi]=chosenFac;
                    markAssigned(assignedSlots,chosenFac,di,pi);
                    markLabRoom(labRoom,di,pi);
                  });
                  labDaysUsed[labRoom].add(di);done=true;
                }
              }
            }
          }
        }
      });

      /* ── Phase 2: Theory — scored greedy ── */
      br.subjects.filter(s=>s.type!=="lab").forEach(s=>{
        const staffList=parseStaff(s.staff);
        let rem=s.hrs||3;
        const ranked=[];
        for(let di=0;di<nd;di++){
          for(const pi of teachSlots){
            if(!grid[di][pi]&&anyFacultyFree(staffList,assignedSlots,di,pi)){
              ranked.push({di,pi,cost:marginalCostMulti(grid,s,staffList,perds,nd,assignedSlots,di,pi)});
            }
          }
        }
        ranked.sort((a,b)=>a.cost-b.cost);
        for(const {di,pi} of ranked){
          if(rem<=0)break;
          if(!grid[di][pi]){
            const chosen=pickFaculty(staffList,assignedSlots,di,pi);
            if(chosen){
              grid[di][pi]=s.abbr;
              roomGrid[di][pi]=theoryRoom;
              facGrid[di][pi]=chosen;
              markAssigned(assignedSlots,chosen,di,pi);rem--;
            }
          }
        }
      });

      /* ── Phase 3: Repair ── */
      repairGridMulti(grid,roomGrid,facGrid,br.subjects,perds,nd,assignedSlots,theoryRoom,br.name,repairLog);

      /* ── Phase 4: Local-search (pairwise swaps) ── */
      optimiseGridMulti(grid,roomGrid,facGrid,br.subjects,perds,nd,assignedSlots,theoryRoom);

      const cs=softScore(grid,br.subjects,perds,nd,assignedSlots);
      _lastSoftReport.totalScore+=cs;
      _lastSoftReport.details.push({cls:br.name+' Sec-'+sec,score:cs});
      /* H3: Weekly hours satisfaction */
      br.subjects.forEach(s=>{
        if(!s.abbr)return;
        const placed=s.type==='lab'
          ?countLabBlocksPlaced(grid,s.abbr,nd,perds)*3
          :countPlaced(grid,s.abbr,nd,perds);
        const required=s.hrs||3;
        hrsReport.push({cls:br.name+' Sec-'+sec,subj:s.abbr,required,placed,ok:placed>=required});
        if(placed<required)repairLog.push('HRS DEFICIT: '+br.name+' Sec-'+sec+' — '+s.abbr+' needs '+required+'h, placed '+placed+'h');
      });
      /* H4: Room capacity tracking */
      br.subjects.forEach(s=>{
        if(s.capacity&&s.capacity>0){
          capacityWarns.push({cls:br.name+' Sec-'+sec,subj:s.abbr,capacity:s.capacity,type:s.type});
        }
      });
    });
  });

  if(repairLog.length)console.info('[Repair Log]\n'+repairLog.join('\n'));
  console.info('[Soft Score] Total='+_lastSoftReport.totalScore);
  _lastSoftReport.hrsReport=hrsReport;
  _lastSoftReport.capacityWarns=capacityWarns;
  _lastSoftReport.repairLog=[...repairLog];
  return res;
}

async function doGenerate(){
  const active=branches.filter(b=>b.enabled&&b.sections.length>0);
  if(!active.length){showToast("Select at least one branch with sections","err");return;}

  // ── Hard validation: every enabled branch must have at least one subject
  //    with non-empty name, abbr, and staff (not blank / "TBD")
  const badBranches=active.filter(br=>{
    const validSubjs=(br.subjects||[]).filter(s=>
      (s.name||"").trim() && (s.abbr||"").trim() &&
      (s.staff||"").trim() && (s.staff||"").trim().toUpperCase()!=="TBD"
    );
    return validSubjs.length===0;
  });
  if(badBranches.length){
    const names=badBranches.map(b=>b.name).join(", ");
    showToast(`⛔ Cannot generate — no valid subjects in: ${names}. Add subjects with name, abbreviation & faculty first.`,"err");
    return;
  }
  document.getElementById("gen-overlay").classList.remove("hidden");
  document.getElementById("gen-title").textContent="Generating Timetables";
  document.getElementById("gen-bar").style.width="0%";
  let prog=0,si=0;
  const blockedCount=Object.values(facultyAvailability).reduce((a,m)=>a+Object.values(m).filter(Boolean).length,0);
  const constrainedFacCount=Object.keys(facultyAvailability).filter(k=>Object.keys(facultyAvailability[k]).length>0).length;
  if(blockedCount>0)document.getElementById("gen-status").textContent=`Loading ${blockedCount} availability constraint(s) for ${constrainedFacCount} faculty…`;
  const steps=["Applying faculty availability constraints…",...active.map(b=>`Scheduling ${b.name}…`),"Conflict detection…","Saving to Firebase…"];
  _genIv=setInterval(()=>{prog=Math.min(prog+7,88);document.getElementById("gen-bar").style.width=prog+"%";if(si<steps.length)document.getElementById("gen-status").textContent=steps[si++];},280);
  await new Promise(r=>setTimeout(r,110));
  const _genStart=performance.now();
  try{
    const res=scheduler(active,periods);
    const now=Date.now();const newTTs=[];
    active.forEach((br,bi)=>{
      const days=br.workingDays==="mon-fri"?DAYS5:DAYS6;
      br.sections.forEach(sec=>{
        newTTs.push({id:`tt_${now}_${bi}_${sec}`,branch:br,section:sec,days:[...days],periods:[...periods],subjects:br.subjects.map(s=>({...s})),grid:res[br.id][sec].grid,roomGrid:res[br.id][sec].roomGrid,facGrid:res[br.id][sec].facGrid,createdAt:now,lockedSlots:{}});
      });
    });
    const keys=new Set(newTTs.map(t=>`${t.branch.id}|${t.section}`));
    timetables=timetables.filter(t=>!keys.has(`${t.branch.id}|${t.section}`));
    timetables=[...timetables,...newTTs];
    await dbSet("jntua_eng_tts",timetables);
    clearInterval(_genIv);document.getElementById("gen-bar").style.width="100%";
    await new Promise(r=>setTimeout(r,400));
    document.getElementById("gen-overlay").classList.add("hidden");
    const _bc=Object.values(facultyAvailability).reduce((a,m)=>a+Object.values(m).filter(Boolean).length,0);
    const _ss=_lastSoftReport.totalScore;
    const _genMs=Math.round(performance.now()-_genStart);
    _lastGenSummary={time:_genMs,tts:newTTs.length,softScore:_ss,availConstraints:_bc,
      hrsReport:_lastSoftReport.hrsReport||[],capacityWarns:_lastSoftReport.capacityWarns||[],
      details:_lastSoftReport.details||[],repairLog:_lastSoftReport.repairLog||[]};
    showToast('\u2705 '+newTTs.length+' timetable(s) generated in '+_genMs+'ms \u00b7 soft score '+_ss+(+_bc>0?' \u00b7 '+_bc+' avail. constraint(s)':''));
    modifyMode=false;modifyTarget=null;lockedSlots={};modifiedCells={};
    document.getElementById("hdr-mode-badge").classList.add("hidden");
    showView('result');
    resultTab='summary';renderResult();
  }catch(e){clearInterval(_genIv);document.getElementById("gen-overlay").classList.add("hidden");showToast("Error: "+e.message,"err");}
}

  const facultyMap={};

      if(!facultyMap[subj.staff])facultyMap[subj.staff]={name:subj.staff,slots:[]};
      tt.days.forEach((day,di)=>{
        tt.periods.forEach((p,pi)=>{

      <div class="card-body" style="text-align:center;padding:40px">
        <div style="font-size:3rem;margin-bottom:14px">✅</div>

      </div>
    </div>`;
  return softPanel+`
    <div class="card">
      <div class="card-hdr">
